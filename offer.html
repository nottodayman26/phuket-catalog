<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подборка — Пхукет</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=cyrillic" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#F7F3FF;font-family:'Inter',system-ui,sans-serif;color:#1C1C2E;-webkit-tap-highlight-color:transparent;}
:root{
  --night:#1C1C2E;--sand:#F7F3FF;--accent:#5E17EB;--red:#FF6B6B;
  --muted:#6B5A9E;--line:rgba(94,23,235,.12);--white:#ffffff;
}

/* ── шапка ── */
.top-bar{background:var(--night);padding:18px 20px 24px;display:flex;align-items:center;justify-content:space-between;}
.flox-logo{font-weight:700;font-size:18px;letter-spacing:-.05em;color:#fff;display:flex;align-items:center;}
.flox-dot{width:5px;height:5px;border-radius:50%;background:var(--red);margin-left:1px;margin-bottom:7px;}
.top-count{font-size:12px;color:rgba(255,255,255,.5);font-weight:500;}

/* ── карточки юнитов ── */
.units{padding:16px;}
.unit-card{background:#fff;border-radius:16px;border:0.5px solid var(--line);margin-bottom:14px;overflow:hidden;}
.unit-plan{background:#fff;height:220px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-bottom:0.5px solid var(--line);}
.unit-plan img{width:100%;height:100%;object-fit:contain;}
.unit-plan-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:#ccc;}
.unit-plan-placeholder i{font-size:40px;}
.unit-plan-placeholder span{font-size:12px;}
/* карусель */
.unit-track{display:flex;width:100%;height:100%;position:absolute;inset:0;transition:transform .3s ease;}
.unit-slide{flex:0 0 100%;position:relative;width:100%;height:100%;}
.unit-slide img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;}
.slide-label{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;z-index:2;}
.slide-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2;}
.slide-dot{width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,.2);}
.slide-dot.act{background:rgba(0,0,0,.6);}
.slide-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:0.5px solid rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;font-size:16px;color:#1C1C2E;transition:opacity .15s;}
.slide-arrow.left{left:10px;}
.slide-arrow.right{right:10px;}
.slide-arrow.dis{opacity:0;pointer-events:none;}
/* статус-бейдж */
.unit-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;z-index:2;}
.badge-avail{background:#dcfce7;color:#15803d;}
.badge-sold{background:#fee2e2;color:#dc2626;}
/* инфо */
.unit-info{padding:14px 16px;}
.unit-proj{font-size:11px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
.unit-num{font-size:17px;font-weight:700;margin-bottom:8px;}
.unit-rows{display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:12px;margin-bottom:10px;}
.unit-rows span:nth-child(odd){color:var(--muted);}
.unit-rows span:nth-child(even){text-align:right;font-weight:500;}
.unit-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:0.5px solid var(--line);}
.unit-price{font-size:16px;font-weight:700;}
.unit-sold-card{opacity:.45;}

/* ── раскрывающийся блок проекта ── */
.proj-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;border-top:0.5px solid var(--line);background:#faf9ff;user-select:none;}
.proj-toggle-label{font-size:12px;font-weight:600;color:var(--accent);}
.proj-toggle-icon{font-size:16px;color:var(--accent);transition:transform .25s;}
.proj-toggle-icon.open{transform:rotate(180deg);}
.proj-content{display:none;padding:16px;border-top:0.5px solid var(--line);background:#faf9ff;}
.proj-content.vis{display:block;}
.proj-name{font-size:18px;font-weight:700;margin-bottom:2px;}
.proj-dev{font-size:12px;color:var(--muted);margin-bottom:14px;}
.proj-section{margin-bottom:16px;}
.proj-section-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.proj-desc{font-size:13px;line-height:1.6;color:#1C1C2E;}
.proj-facility-list{display:flex;flex-wrap:wrap;gap:6px;}
.proj-facility{background:#fff;border:0.5px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;color:#1C1C2E;}
.proj-nearby-list{display:flex;flex-direction:column;gap:6px;}
.proj-nearby-item{display:flex;justify-content:space-between;font-size:12px;padding:8px 10px;background:#fff;border-radius:8px;border:0.5px solid var(--line);}
.proj-nearby-left{display:flex;align-items:center;gap:6px;}
.proj-nearby-time{color:var(--muted);}
.pay-table{width:100%;border-collapse:collapse;font-size:12px;}
.pay-table td{padding:7px 4px;border-bottom:0.5px solid var(--line);}
.pay-table tr:last-child td{border-bottom:none;}
.pay-table td:last-child{text-align:right;font-weight:600;}
.maint-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:0.5px solid var(--line);}
.maint-row:last-child{border-bottom:none;}
.maint-label{color:var(--muted);}
.files-list{display:flex;flex-direction:column;gap:8px;}
.file-item{display:flex;align-items:center;gap:10px;background:#fff;border:0.5px solid var(--line);border-radius:10px;padding:10px 12px;text-decoration:none;color:#1C1C2E;}
.file-icon{font-size:18px;color:var(--accent);}
.file-name{font-size:13px;font-weight:500;}

/* ── галерея в блоке проекта ── */
.proj-gallery{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.proj-gallery img{width:100%;height:100px;object-fit:cover;border-radius:8px;cursor:pointer;}

/* ── футер ── */
.footer{padding:24px 20px;text-align:center;}
.footer-logo{font-weight:700;font-size:16px;letter-spacing:-.05em;color:var(--night);display:inline-flex;align-items:center;margin-bottom:6px;}
.footer-dot{width:5px;height:5px;border-radius:50%;background:var(--red);margin-left:1px;margin-bottom:6px;}
.footer-sub{font-size:11px;color:var(--muted);}

/* ── лоадер ── */
.loader-wrap{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;}
.error-wrap{padding:40px 20px;text-align:center;}
.error-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.error-sub{font-size:13px;color:var(--muted);}
</style>
</head>
<body>

<div class="top-bar">
  <div class="flox-logo">flox<span class="flox-dot"></span></div>
  <div class="top-count" id="topCount"></div>
</div>

<div id="main">
  <div class="loader-wrap">Загружаем подборку…</div>
</div>

<div class="footer">
  <div class="footer-logo">flox<span class="footer-dot"></span></div>
  <div class="footer-sub">Сервис для агентов недвижимости Пхукета</div>
</div>

<script>
const SB_URL = 'https://lqhuegdwglzkfzjcfxdx.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxaHVlZ2R3Z2x6a2Z6amNmeGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjA5NjIsImV4cCI6MjA5NzM5Njk2Mn0.egEtZ5Av8tAD_Y6tKtWowxpbHoCiDezWEG5gWpEYNpo';
const HDR = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };
const BASE = location.pathname.replace(/\/[^\/]*$/, '/');

function fmtMln(n) {
  if (!n) return '—';
  return n >= 1000000 ? (n/1e6).toFixed(2).replace(/\.?0+$/, '') + ' млн ฿' : Math.round(n).toLocaleString('ru') + ' ฿';
}

function catRu(rt) {
  if (!rt) return '—';
  const s = rt.toLowerCase();
  if (s.includes('studio')) return 'Студия';
  if (s.includes('plus')) return '1 спальня+';
  if (s.includes('2 bedroom') || s.includes('2br')) return '2 спальни';
  if (s.includes('3 bedroom')) return '3 спальни';
  if (s.includes('ph') || s.includes('penthouse')) return 'Пентхаус';
  if (s.includes('1 bedroom') || s.includes('1br')) return '1 спальня';
  return rt;
}

// ── Карусель ──────────────────────────────────────────────────
function initCarousel(card, slides) {
  const plan = card.querySelector('.unit-plan');
  const placeholder = plan.querySelector('.unit-plan-placeholder');
  if (placeholder) placeholder.remove();

  const track = document.createElement('div');
  track.className = 'unit-track';
  slides.forEach(s => {
    const slide = document.createElement('div');
    slide.className = 'unit-slide';
    const img = document.createElement('img');
    img.src = s.path; img.alt = s.label;
    slide.appendChild(img);
    track.appendChild(slide);
  });
  plan.appendChild(track);

  if (slides.length > 1) {
    const labelEl = document.createElement('div');
    labelEl.className = 'slide-label';
    labelEl.textContent = slides[0].label;
    plan.appendChild(labelEl);

    const dotsEl = document.createElement('div');
    dotsEl.className = 'slide-dots';
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'slide-dot' + (i === 0 ? ' act' : '');
      dotsEl.appendChild(d);
    });
    plan.appendChild(dotsEl);

    const arL = document.createElement('div');
    arL.className = 'slide-arrow left dis';
    arL.innerHTML = '<i class="ti ti-chevron-left"></i>';
    const arR = document.createElement('div');
    arR.className = 'slide-arrow right';
    arR.innerHTML = '<i class="ti ti-chevron-right"></i>';
    plan.appendChild(arL); plan.appendChild(arR);

    let cur = 0;
    let sx = 0, dx = 0, dragging = false;

    function goTo(idx) {
      cur = Math.max(0, Math.min(slides.length - 1, idx));
      track.style.transform = `translateX(-${cur * 100}%)`;
      labelEl.textContent = slides[cur].label;
      [...dotsEl.children].forEach((d, i) => d.classList.toggle('act', i === cur));
      arL.classList.toggle('dis', cur === 0);
      arR.classList.toggle('dis', cur === slides.length - 1);
    }
    arL.addEventListener('click', e => { e.stopPropagation(); goTo(cur - 1); });
    arR.addEventListener('click', e => { e.stopPropagation(); goTo(cur + 1); });

    plan.addEventListener('touchstart', e => { sx = e.touches[0].clientX; dragging = true; track.style.transition = 'none'; }, { passive: true });
    plan.addEventListener('touchmove', e => { if (!dragging) return; dx = e.touches[0].clientX - sx; track.style.transform = `translateX(calc(-${cur*100}% + ${dx}px))`; }, { passive: true });
    plan.addEventListener('touchend', () => { dragging = false; track.style.transition = 'transform .3s ease'; if (Math.abs(dx) > 50) goTo(cur + (dx < 0 ? 1 : -1)); else goTo(cur); dx = 0; });
  }
}

async function loadSlides(u, projCode) {
  const TOWER_CYR = { A: 'а', B: 'б', C: 'с', D: 'д' };
  const slides = [];

  if (projCode && u.plan_code && u.area_sqm) {
    slides.push({ path: `${BASE}img/${projCode}/units/${encodeURIComponent(Number(u.area_sqm).toFixed(2)+'_'+u.plan_code+'.jpg')}`, label: 'Планировка' });
  }
  if (projCode && u.tower && u.floor) {
    const tc = TOWER_CYR[String(u.tower).toUpperCase()] || String(u.tower).toLowerCase();
    slides.push({ path: `${BASE}img/${projCode}/floor-plans/${encodeURIComponent(tc+u.floor+'.jpg')}`, label: `Поэтажный план · Этаж ${u.floor}` });
  }
  if (projCode && u.floor) {
    const p = String(Number(u.floor)+1).padStart(4,'0');
    slides.push({ path: `${BASE}img/${projCode}/masterplan/${encodeURIComponent('мастер план_page-'+p+'.jpg')}`, label: `Мастер-план · Этаж ${u.floor}` });
  }

  const found = await Promise.all(slides.map(s => new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(s);
    img.onerror = () => resolve(null);
    img.src = s.path;
  })));
  return found.filter(Boolean);
}

// ── Блоки о проекте ──────────────────────────────────────────
function renderProjBlocks(projData, blocks) {
  const parts = [];

  if (blocks.includes('project_name') || blocks.includes('developer')) {
    let h = '';
    if (blocks.includes('project_name')) h += `<div class="proj-name">${projData.name || ''}</div>`;
    if (blocks.includes('developer')) h += `<div class="proj-dev">${projData.developer || ''}</div>`;
    parts.push(h);
  }

  if (blocks.includes('description') && projData.description) {
    parts.push(`<div class="proj-section">
      <div class="proj-section-title">О проекте</div>
      <div class="proj-desc">${projData.description}</div>
    </div>`);
  }

  if (blocks.includes('nearby') && projData.nearby?.length) {
    parts.push(`<div class="proj-section">
      <div class="proj-section-title">Рядом</div>
      <div class="proj-nearby-list">
        ${projData.nearby.map(n => `<div class="proj-nearby-item">
          <div class="proj-nearby-left"><span>${n.icon||''}</span><span>${n.name}</span></div>
          <span class="proj-nearby-time">${n.time || ''} · ${n.dist || ''}</span>
        </div>`).join('')}
      </div>
    </div>`);
  }

  if (blocks.includes('gallery') && projData.gallery?.local?.length) {
    const imgs = projData.gallery.local.slice(0, 6).map(f =>
      `<img src="${BASE}img/${projData.id}/${f}" alt="" loading="lazy" onerror="this.style.display='none'">`
    ).join('');
    parts.push(`<div class="proj-section">
      <div class="proj-section-title">Рендеры и фото</div>
      <div class="proj-gallery">${imgs}</div>
    </div>`);
  }

  if (blocks.includes('payment_schedule') && projData.payment_schedule?.length) {
    const rows = projData.payment_schedule.map(s =>
      `<tr><td>${s.stage}${s.note ? ' <span style="color:var(--muted);font-size:11px">'+s.note+'</span>' : ''}</td><td>${s.percent ? s.percent+'%' : '—'}</td></tr>`
    ).join('');
    parts.push(`<div class="proj-section">
      <div class="proj-section-title">График платежей</div>
      <table class="pay-table">${rows}</table>
    </div>`);
  }

  if (blocks.includes('maintenance') && projData.maintenance) {
    const m = projData.maintenance;
    parts.push(`<div class="proj-section">
      <div class="proj-section-title">Обслуживание</div>
      ${m.common_fee?.amount ? `<div class="maint-row"><span class="maint-label">Common fee</span><span>${m.common_fee.amount} ${m.common_fee.unit||''}</span></div>` : ''}
      ${m.sinking_fund?.amount ? `<div class="maint-row"><span class="maint-label">Sinking fund</span><span>${m.sinking_fund.amount} ${m.sinking_fund.unit||''}</span></div>` : ''}
    </div>`);
  }

  if (blocks.includes('files') && projData.files?.length) {
    const items = projData.files.map(f =>
      `<a class="file-item" href="${f.url}" target="_blank">
        <i class="ti ti-file-type-pdf file-icon"></i>
        <span class="file-name">${f.name}</span>
      </a>`
    ).join('');
    parts.push(`<div class="proj-section">
      <div class="proj-section-title">Файлы</div>
      <div class="files-list">${items}</div>
    </div>`);
  }

  return parts.join('');
}

// ── Главная логика ────────────────────────────────────────────
async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showError('Неверная ссылка'); return; }

  const r = await fetch(`${SB_URL}/presentations?id=eq.${id}&select=*`, { headers: HDR });
  const rows = await r.json();
  if (!rows.length) { showError('Подборка не найдена или ссылка устарела'); return; }
  const pres = rows[0];

  const units_meta = pres.units || [];
  const project_blocks = pres.project_blocks || {};

  if (!units_meta.length) { showError('В подборке нет юнитов'); return; }

  const roomNos = units_meta.map(u => u.room_no);
  const ur = await fetch(`${SB_URL}/units?room_no=in.(${roomNos.map(r=>`"${r}"`).join(',')})&select=room_no,tower,floor,room_type,area_sqm,selling_price,price_per_sqm,status,plan_code`, { headers: HDR });
  const units = await ur.json();

  const projectIds = [...new Set(units_meta.map(u => u.project).filter(Boolean))];
  const projMap = {};
  for (const pid of projectIds) {
    try {
      const pj = await fetch(`${BASE}projects/${pid}.json`);
      if (pj.ok) projMap[pid] = await pj.json();
    } catch(e) {}
  }

  document.getElementById('topCount').textContent = `${units.length} объект${units.length===1?'':units.length<5?'а':'ов'}`;

  const html = units_meta.map(meta => {
    const u = units.find(x => x.room_no === meta.room_no);
    if (!u) return '';
    const proj = projMap[meta.project];
    const isAvail = u.status === 'available';
    const cat = catRu(u.room_type);
    const projName = proj?.name || meta.project || '';
    const blocks = project_blocks[meta.project] || [];

    return `<div class="unit-card${isAvail ? '' : ' unit-sold-card'}" id="uc-${u.room_no}">
      <div class="unit-plan">
        <div class="unit-plan-placeholder">
          <i class="ti ti-layout-2"></i>
          <span>Загружаем план…</span>
        </div>
        <span class="unit-badge ${isAvail ? 'badge-avail' : 'badge-sold'}">${isAvail ? 'Свободен' : 'Продан'}</span>
      </div>
      <div class="unit-info">
        <div class="unit-proj">${projName}</div>
        <div class="unit-num">${u.room_no}</div>
        <div class="unit-rows">
          <span>Тип</span><span>${cat}</span>
          <span>Площадь</span><span>${u.area_sqm} м²</span>
          <span>Этаж</span><span>${u.floor}${proj?.floors ? ' / '+proj.floors : ''}</span>
        </div>
        <div class="unit-bottom">
          <span class="unit-price">${fmtMln(u.selling_price)}</span>
        </div>
      </div>
      ${blocks.length ? `
      <div class="proj-toggle" onclick="toggleProj('pt-${u.room_no}')">
        <span class="proj-toggle-label">О проекте</span>
        <i class="ti ti-chevron-down proj-toggle-icon" id="pti-${u.room_no}"></i>
      </div>
      <div class="proj-content" id="pt-${u.room_no}">
        ${proj ? renderProjBlocks(proj, blocks) : ''}
      </div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `<div class="units">${html}</div>`;

  // Загружаем слайды для каждого юнита
  for (const meta of units_meta) {
    const u = units.find(x => x.room_no === meta.room_no);
    if (!u) continue;
    const card = document.getElementById(`uc-${u.room_no}`);
    if (!card) continue;
    const slides = await loadSlides(u, meta.project);
    if (slides.length) {
      initCarousel(card, slides);
    } else {
      const ph = card.querySelector('.unit-plan-placeholder');
      if (ph) ph.querySelector('span').textContent = 'Планировка появится позже';
    }
  }
}

function toggleProj(id) {
  const content = document.getElementById(id);
  const roomNo = id.replace('pt-', '');
  const icon = document.getElementById(`pti-${roomNo}`);
  content.classList.toggle('vis');
  icon.classList.toggle('open');
}

function showError(msg) {
  document.getElementById('main').innerHTML = `<div class="error-wrap">
    <div class="error-title">Что-то пошло не так</div>
    <div class="error-sub">${msg}</div>
  </div>`;
}

init();
</script>
</body>
</html>
