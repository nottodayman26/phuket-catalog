<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flox — Проект</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=cyrillic" rel="stylesheet">
<style>
:root {
  --meeting-logo-vis: visible;
  --meeting-reward-display: block;
  --bg: #0d0d18;
  --surface: #111118;
  --surface-2: #1a1a26;
  --surface-3: #222232;
  --line: rgba(255,255,255,0.06);
  --line-2: rgba(255,255,255,0.1);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.45);
  --muted-2: rgba(255,255,255,0.2);
  --accent: #5E17EB;
  --accent-soft: rgba(94,23,235,0.18);
  --green: #7BAF6E;
  --green-soft: rgba(123,175,110,0.15);
  --red: #FF6B6B;
  --project-color: #5E17EB;
  --project-soft: rgba(94,23,235,0.18);
}
body.light {
  --bg: #F5F5F7;
  --surface: #ffffff;
  --surface-2: #f0f0f4;
  --surface-3: #e8e8ee;
  --line: rgba(0,0,0,0.07);
  --line-2: rgba(0,0,0,0.12);
  --text: #111118;
  --muted: rgba(0,0,0,0.45);
  --muted-2: rgba(0,0,0,0.22);
  --accent-soft: rgba(94,23,235,0.1);
  --project-soft: rgba(94,23,235,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: 'Inter', system-ui, sans-serif; }
body { min-height: 100vh; font-family: inherit; background: var(--bg); color: var(--text); transition: background .3s, color .3s; }
a { color: inherit; text-decoration: none; }

/* ── TOP BAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 0.5px solid var(--line);
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 52px;
}
.topbar-back {
  display: flex; align-items: center; gap: 6px;
  color: var(--muted); font-size: 13px; cursor: pointer;
  padding: 6px 10px; border-radius: 8px;
  transition: background .15s, color .15s;
}
.topbar-back:hover { background: var(--surface-2); color: var(--text); }
.topbar-logo {
  font-size: 20px; font-weight: 700; letter-spacing: -0.05em;
  display: flex; align-items: center; gap: 2px;
}
.logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); margin-bottom: 10px; flex-shrink: 0; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.theme-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: none; background: var(--surface-2); color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.theme-btn:hover { background: var(--surface-3); }
.topbar-logo { font-size:20px;font-weight:700;letter-spacing:-0.05em;color:var(--text);cursor:default;visibility:var(--meeting-logo-vis); }
.topbar-nav { display:flex;align-items:center;gap:2px;margin-left:16px; }
.tnav-item {
  padding:5px 12px;border-radius:8px;font-size:13px;font-weight:500;
  color:var(--muted);text-decoration:none;transition:background .15s,color .15s;
}
.tnav-item:hover { background:var(--surface-2);color:var(--text); }
.meeting-btn-proj {
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:8px;border:1px solid var(--line-2);
  background:none;color:var(--muted);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.meeting-btn-proj:hover { border-color:var(--accent);color:var(--accent); }
.meeting-btn-proj.act { background:var(--accent);border-color:var(--accent);color:#fff; }

/* ── HERO ─── */
.hero {
  position: relative; background: var(--surface-2);
  overflow: hidden;
}
.hero-imgs {
  display: flex; gap: 4px; height: 400px;
}
.hero-main {
  flex: 1; overflow: hidden; cursor: pointer; position: relative;
}
.hero-main img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.hero-main:hover img { transform: scale(1.03); }
.hero-side { display: flex; flex-direction: column; gap: 4px; width: 200px; }
.hero-thumb { flex: 1; overflow: hidden; cursor: pointer; position: relative; }
.hero-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.hero-thumb:hover img { transform: scale(1.05); }
.hero-more {
  position: absolute; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 15px; font-weight: 700;
}
.hero-placeholder {
  height: 360px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--muted);
}
.hero-drive-sections {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.hero-drive-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface-3); color: var(--text);
  padding: 7px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
  text-decoration: none; border: 1px solid var(--line-2);
  transition: border-color .15s, background .15s;
}
.hero-drive-btn:hover { border-color: var(--project-color); background: var(--project-soft); }
.hero-drive-btn.primary {
  background: var(--project-color); color: #fff; border-color: var(--project-color);
}

/* ── BODY ─── */
.body-wrap {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 310px; gap: 24px;
  padding: 24px 20px;
}
@media(max-width:900px) {
  .body-wrap { grid-template-columns: 1fr; }
  .sidebar-col { order: -1; }
}

/* ── PROJ HEADER ─── */
.proj-header { margin-bottom: 20px; }
.proj-breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.proj-breadcrumb span { color: var(--project-color); }
.proj-title { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
.proj-sub { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.proj-badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  background: var(--green-soft); color: var(--green);
}

/* ── TABS ─── */
.tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--line);
  margin-bottom: 24px; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--text); }
.tab.act { color: var(--project-color); border-bottom-color: var(--project-color); font-weight: 600; }

/* ── PANELS ─── */
.panel { display: none; }
.panel.act { display: block; }

/* ── UNITS ─── */
.units-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.uf-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--line-2); color: var(--muted);
  cursor: pointer; background: none; font-family: inherit;
  transition: all .15s;
}
.uf-btn:hover { border-color: var(--project-color); color: var(--project-color); }
.uf-btn.act { background: var(--project-color); border-color: var(--project-color); color: #fff; }
.units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 12px; }
.unit-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; padding: 16px; cursor: pointer;
  transition: border-color .2s, transform .15s;
}
.unit-card:hover { border-color: var(--project-color); transform: translateY(-2px); }
.unit-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
.unit-type-label { font-size: 13px; font-weight: 600; display: flex; align-items: center; margin-bottom: 12px; }
.unit-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.us-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .04em; }
.us-val { font-size: 13px; font-weight: 600; }
.us-price { color: var(--project-color); }

/* ── SECTION TITLE ─── */
.sec-title {
  font-size: 15px; font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--line); }

/* ── ABOUT ─── */
.desc-text { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 24px; }
.facilities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); gap: 10px; margin-bottom: 24px; }
.fac-item {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; display: flex; align-items: center; gap: 8px;
}
.fac-icon { font-size: 18px; }
.info-box {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; padding: 16px;
}
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); }
.info-val { font-weight: 600; }

/* ── MAP ─── */
.map-wrap { border-radius: 14px; overflow: hidden; border: 1px solid var(--line); margin-bottom: 20px; }
.nearby-list { display: flex; flex-direction: column; gap: 8px; }
.nearby-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 11px 14px;
}
.nearby-icon { font-size: 20px; width: 30px; text-align: center; }
.nearby-name { font-size: 13px; font-weight: 500; flex: 1; }
.nearby-dist { text-align: right; }
.nearby-dist-val { font-size: 12px; font-weight: 600; }
.nearby-time { font-size: 11px; color: var(--muted); }

/* ── PAYMENT ─── */
.ps-timeline {
  display: flex; align-items: flex-start;
  margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px;
}
.ps-step { flex: 1; min-width: 70px; text-align: center; position: relative; }
.ps-step::before {
  content: ''; display: block; height: 3px;
  background: var(--line-2);
  position: absolute; top: 13px; left: 50%; right: -50%;
}
.ps-step:last-child::before { display: none; }
.ps-dot {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--project-color); color: #fff;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 6px; position: relative; z-index: 1;
}
.ps-step-label { font-size: 9px; color: var(--muted); line-height: 1.3; }
.ps-table { width: 100%; border-collapse: collapse; }
.ps-table th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--line);
  text-transform: uppercase; letter-spacing: .05em;
}
.ps-table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--line); }
.ps-table tr:last-child td { border-bottom: none; }
.ps-pct { font-weight: 700; color: var(--project-color); font-size: 15px; }

/* ── MAINTENANCE ─── */
.maint-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 0; border-bottom: 1px solid var(--line); font-size: 13px;
}
.maint-row:last-child { border-bottom: none; }
.maint-label { color: var(--muted); }
.maint-val { font-weight: 600; }
.maint-note {
  margin-top: 14px; padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; font-size: 12px; color: var(--muted); line-height: 1.6;
}

/* ── FILES ─── */
.files-list { display: flex; flex-direction: column; gap: 8px; }
.file-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 13px 16px;
  text-decoration: none; color: var(--text);
  transition: border-color .15s, background .15s;
}
.file-item:hover { border-color: var(--project-color); background: var(--surface-2); }
.file-item.highlight { border-color: var(--project-color); }
.file-icon { font-size: 22px; }
.file-name { font-size: 13px; font-weight: 500; flex: 1; }
.file-type { font-size: 11px; color: var(--muted); background: var(--surface-2); padding: 2px 7px; border-radius: 5px; }
.file-arrow { color: var(--muted); }

/* ── SIDEBAR ─── */
.sidebar-col { display: flex; flex-direction: column; gap: 14px; }

.reward-card {
  background: var(--surface);
  border: 1px solid var(--project-color);
  border-radius: 14px; padding: 18px;
  position: relative; overflow: hidden;
  display: var(--meeting-reward-display);
}
.reward-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--project-color);
}
.reward-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.reward-pct { font-size: 38px; font-weight: 700; color: var(--project-color); line-height: 1; }
.reward-pct sup { font-size: 18px; font-weight: 400; }
.reward-tbd { font-size: 14px; color: var(--muted); margin-top: 4px; }
.reward-rows { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
.reward-row { display: flex; justify-content: space-between; font-size: 12px; }
.reward-row-label { color: var(--muted); }
.reward-row-val { font-weight: 600; }
.reward-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

.price-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 18px;
}
.price-from-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.price-from-val { font-size: 24px; font-weight: 700; color: var(--project-color); }
.price-to { font-size: 13px; color: var(--muted); margin-top: 2px; }

.info-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 18px;
}
.info-card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

.action-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 13px; border-radius: 12px;
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; border: none; transition: opacity .2s, transform .1s;
  text-decoration: none;
}
.action-btn:active { transform: scale(0.98); }
.action-btn.primary { background: var(--project-color); color: #fff; }
.action-btn.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--line-2); }
.action-btn:hover { opacity: 0.85; }

/* ── UTILS ─── */
.spinner {
  width: 30px; height: 30px; border-radius: 50%;
  border: 3px solid var(--line-2); border-top-color: var(--project-color);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading { display: flex; align-items: center; justify-content: center; height: 200px; flex-direction: column; gap: 12px; color: var(--muted); font-size: 14px; }
</style>
<script>
// Instant meeting mode — prevents flash before JS loads
(function(){
  if (localStorage.getItem("flox-meeting") === "true") {
    document.documentElement.style.setProperty("--meeting-logo-vis", "hidden");
    document.documentElement.style.setProperty("--meeting-reward-display", "none");
  }
})();
</script>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo" id="topbarLogo">flox<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:1px;margin-bottom:8px;vertical-align:bottom"></span></div>
  <nav class="topbar-nav">
    <a class="tnav-item" href="flox-web.html">Поиск</a>
    <a class="tnav-item" href="flox-web.html#offers" onclick="localStorage.setItem('flox-page','offers')">Инструменты</a>
    <a class="tnav-item" href="flox-web.html#activity" onclick="localStorage.setItem('flox-page','activity')">Клиенты</a>
  </nav>
  <div class="topbar-right">
    <button class="meeting-btn-proj" id="meetingBtnProj" onclick="toggleMeeting()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span id="meetingBtnLabel">Встреча</span>
    </button>
    <button class="theme-btn" onclick="toggleTheme()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</div>

<!-- HERO -->
<div class="hero" id="heroSection">
  <div class="loading"><div class="spinner"></div></div>
</div>

<!-- BODY -->
<div class="body-wrap">
  <div class="main-col" id="mainCol">
    <div class="loading"><div class="spinner"></div></div>
  </div>
  <div class="sidebar-col" id="sidebarCol"></div>
</div>

<script>
const fmt = n => new Intl.NumberFormat('ru-RU').format(n);
const fmtMln = n => n >= 1000000 ? (n/1000000).toFixed(1).replace('.0','') + ' млн ฿' : fmt(n) + ' ฿';

// Theme
const saved = localStorage.getItem('flox-theme') || 'dark';
if (saved === 'light') document.body.classList.add('light');
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('flox-theme', document.body.classList.contains('light') ? 'light' : 'dark');
}

const params = new URLSearchParams(location.search);
const pid = params.get('id') || 'VIK';

async function loadProject() {
  try {
    const base = location.pathname.replace(/\/[^\/]*$/, "/"); const res = await fetch(`${base}projects/${pid}.json?v=${Date.now()}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderProject(data);
  } catch(e) {
    document.getElementById('mainCol').innerHTML = `<div class="loading"><span>Проект не найден: ${pid}</span></div>`;
  }
}

function renderProject(d) {
  document.documentElement.style.setProperty('--project-color', d.color || '#5E17EB');
  const soft = d.color ? d.color + '22' : 'rgba(94,23,235,0.18)';
  document.documentElement.style.setProperty('--project-soft', soft);
  document.title = `Flox — ${d.name}`;

  renderHero(d);
  renderSidebar(d);

  document.getElementById('mainCol').innerHTML = `
    <div class="proj-header">
      <div class="proj-breadcrumb">Каталог / <span>${d.district}</span> / ${d.name}</div>
      <div class="proj-title">${d.name}</div>
      <div class="proj-sub">
        <span>${d.district}, Phuket</span>
        <span>•</span>
        <span>${d.developer}</span>
        <span class="proj-badge">${d.status}</span>
      </div>
    </div>
    <div class="tabs">
      <div class="tab act" data-tab="units">Юниты</div>
      <div class="tab" data-tab="about">О проекте</div>
      <div class="tab" data-tab="map">Карта</div>
      <div class="tab" data-tab="payment">Payment Schedule</div>
      <div class="tab" data-tab="maint">Обслуживание</div>
      <div class="tab" data-tab="files">Файлы</div>
    </div>
    <div id="p-units"   class="panel act">${renderUnits(d)}</div>
    <div id="p-about"   class="panel">${renderAbout(d)}</div>
    <div id="p-map"     class="panel">${renderMap(d)}</div>
    <div id="p-payment" class="panel">${renderPayment(d)}</div>
    <div id="p-maint"   class="panel">${renderMaint(d)}</div>
    <div id="p-files"   class="panel">${renderFiles(d)}</div>
  `;

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('act'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('act'));
    t.classList.add('act');
    document.getElementById('p-' + t.dataset.tab).classList.add('act');
  }));

  document.querySelectorAll('.uf-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.uf-btn').forEach(b => b.classList.remove('act'));
    btn.classList.add('act');
    const f = btn.dataset.filter;
    document.querySelectorAll('.unit-card').forEach(c => {
      c.style.display = (f === 'all' || c.dataset.bed === f) ? '' : 'none';
    });
  }));

  // Apply meeting mode after full render
  applyMeetingMode();
}

function renderHero(d) {
  const hero = document.getElementById('heroSection');
  const local = (d.gallery && d.gallery.local) ? d.gallery.local : [];
  const sections = (d.gallery && d.gallery.sections) ? d.gallery.sections : [];

  if (local.length > 0) {
    const main = local[0];
    const thumbs = local.slice(1, 4);
    const more = local.length - 4;
    hero.innerHTML = `
      <div class="hero-imgs">
        <div class="hero-main"><img src="${main}" alt="${d.name}"/></div>
        <div class="hero-side">
          ${thumbs.map((img, i) => `
            <div class="hero-thumb">
              <img src="${img}" alt=""/>
              ${i === 2 && more > 0 ? `<div class="hero-more">+${more}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>`;
  } else {
    const sectionBtns = sections.map(s =>
      `<a class="hero-drive-btn" href="${s.url}" target="_blank">📁 ${s.name}</a>`
    ).join('');
    hero.innerHTML = `
      <div class="hero-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".3"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <div style="text-align:center;">
          <div style="font-size:15px;font-weight:600;margin-bottom:8px;">Галерея проекта</div>
          <div class="hero-drive-sections" style="margin-bottom:16px;">${sectionBtns}</div>
          <a class="hero-drive-btn primary" href="${d.drive_root}" target="_blank">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Открыть Google Drive
          </a>
        </div>
      </div>`;
  }
}

function renderUnits(d) {
  const beds = [...new Set(d.unit_types.map(u => u.bedrooms))].sort();
  return `
    <div class="units-filter">
      <button class="uf-btn act" data-filter="all">Все типы</button>
      ${beds.map(b => `<button class="uf-btn" data-filter="${b}">${b} спальн${b===1?'я':'и'}</button>`).join('')}
    </div>
    <div class="units-grid">
      ${d.unit_types.map(u => `
        <div class="unit-card" data-bed="${u.bedrooms}">
          <div class="unit-type-label">
            <span class="unit-dot" style="background:${u.color}"></span>${u.type}
          </div>
          <div class="unit-stats">
            <div><div class="us-label">Площадь</div><div class="us-val">${u.area_from}–${u.area_to} м²</div></div>
            <div><div class="us-label">Спальни</div><div class="us-val">${u.bedrooms} BR</div></div>
            <div><div class="us-label">Цена от</div><div class="us-val us-price">${fmtMln(u.price_from)}</div></div>
            <div><div class="us-label">Цена до</div><div class="us-val us-price">${fmtMln(u.price_to)}</div></div>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderAbout(d) {
  const icons = { 'бассейн':'🏊','фитнес':'💪','лобби':'🏨','парковка':'🅿️','сад':'🌿','вода':'💧','охрана':'🔐' };
  const getIcon = f => { for(const [k,v] of Object.entries(icons)) if(f.toLowerCase().includes(k)) return v; return '✨'; };
  return `
    <div class="sec-title">Описание</div>
    <p class="desc-text">${d.description}</p>
    <div class="sec-title">Инфраструктура</div>
    <div class="facilities-grid">
      ${d.facilities.map(f => `<div class="fac-item"><span class="fac-icon">${getIcon(f)}</span><span>${f}</span></div>`).join('')}
    </div>
    <div class="sec-title">Детали проекта</div>
    <div class="info-box">
      <div class="info-row"><span class="info-label">Застройщик</span><span class="info-val">${d.developer}</span></div>
      <div class="info-row"><span class="info-label">Корпуса</span><span class="info-val">${d.buildings.join(', ')}</span></div>
      <div class="info-row"><span class="info-label">Этажей</span><span class="info-val">${d.floors}</span></div>
      <div class="info-row"><span class="info-label">Сдача</span><span class="info-val">${d.completion}</span></div>
      <div class="info-row"><span class="info-label">Район</span><span class="info-val">${d.district}, ${d.amphoe}</span></div>
    </div>`;
}

function renderMap(d) {
  const { lat, lng } = d.coords;
  return `
    <div class="map-wrap">
      <iframe width="100%" height="340" style="border:0;" loading="lazy" allowfullscreen
        src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed">
      </iframe>
    </div>
    <div class="sec-title">Ближайшие локации</div>
    <div class="nearby-list">
      ${d.nearby.map(n => `
        <div class="nearby-item">
          <span class="nearby-icon">${n.icon}</span>
          <span class="nearby-name">${n.name}</span>
          <div class="nearby-dist">
            <div class="nearby-dist-val">${n.dist}</div>
            <div class="nearby-time">${n.time}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderPayment(d) {
  const total = d.payment_schedule.reduce((s,p) => s+p.percent, 0);
  return `
    <div class="sec-title">Payment Schedule</div>
    <div class="ps-timeline">
      ${d.payment_schedule.map(p => `
        <div class="ps-step">
          <div class="ps-dot">${p.percent}%</div>
          <div class="ps-step-label">${p.stage}</div>
        </div>`).join('')}
    </div>
    <table class="ps-table">
      <thead><tr><th>Этап</th><th>Условие</th><th style="text-align:right">%</th></tr></thead>
      <tbody>
        ${d.payment_schedule.map(p => `
          <tr>
            <td>${p.stage}</td>
            <td style="color:var(--muted);font-size:12px">${p.note}</td>
            <td style="text-align:right"><span class="ps-pct">${p.percent}%</span></td>
          </tr>`).join('')}
      </tbody>
      <tfoot><tr>
        <td colspan="2" style="padding:12px 14px;font-size:12px;color:var(--muted)">Итого</td>
        <td style="text-align:right;padding:12px 14px;font-weight:700">${total}%</td>
      </tr></tfoot>
    </table>`;
}

function renderMaint(d) {
  const m = d.maintenance;
  const cfAmt = m.common_fee.amount === 0 ? 'уточняется' : `${m.common_fee.amount} ${m.common_fee.unit}`;
  const sfAmt = m.sinking_fund.amount === 0 ? 'уточняется' : `${m.sinking_fund.amount} ${m.sinking_fund.unit}`;
  return `
    <div class="sec-title">Обслуживание</div>
    <div>
      <div class="maint-row"><span class="maint-label">Common fee</span><span class="maint-val">${cfAmt}</span></div>
      <div class="maint-row"><span class="maint-label">Sinking fund</span><span class="maint-val">${sfAmt}</span></div>
      <div class="maint-row"><span class="maint-label">Регистрация — Фрихолд</span><span class="maint-val">${m.registration.freehold}</span></div>
      <div class="maint-row"><span class="maint-label">Регистрация — Лизхолд</span><span class="maint-val">${m.registration.leasehold}</span></div>
    </div>
    <div class="maint-note">${m.notes}</div>`;
}

function renderFiles(d) {
  const icons = { pdf:'📄', folder:'📁', link:'🔗' };
  return `
    <div class="sec-title">Файлы проекта</div>
    <div class="files-list">
      ${d.files.map(f => `
        <a class="file-item" href="${f.url}" target="_blank">
          <span class="file-icon">${icons[f.type]||'📄'}</span>
          <span class="file-name">${f.name}</span>
          <span class="file-type">${f.type.toUpperCase()}</span>
          <span class="file-arrow">↗</span>
        </a>`).join('')}
      <a class="file-item highlight" href="${d.drive_root}" target="_blank">
        <span class="file-icon">🗂️</span>
        <span class="file-name">Весь Google Drive проекта</span>
        <span class="file-arrow">↗</span>
      </a>
    </div>`;
}

function renderSidebar(d) {
  const r = d.agent_reward;
  const pctHtml = r.percent_from === 0
    ? `<div class="reward-tbd">уточняется</div>`
    : `<div class="reward-pct">${r.percent_from}–${r.percent_to}<sup>%</sup></div>`;
  const daysHtml = (!r.payment_days || r.payment_days === 0) ? "уточняется" : `${r.payment_days} дней`;
  const scaleHtml = r.scale === 'уточняется' ? 'уточняется' : r.scale;

  document.getElementById('sidebarCol').innerHTML = `
    <div class="reward-card">
      <div class="reward-label">🎯 Ваше вознаграждение</div>
      ${pctHtml}
      <div class="reward-rows">
        <div class="reward-row"><span class="reward-row-label">Шкала</span><span class="reward-row-val">${scaleHtml}</span></div>
        <div class="reward-row"><span class="reward-row-label">Срок выплаты</span><span class="reward-row-val">${daysHtml}</span></div>
      </div>
      <div class="reward-note">${r.note}</div>
    </div>

    <div class="price-card">
      <div class="price-from-label">Цена от</div>
      <div class="price-from-val">${fmtMln(d.price_from)}</div>
      <div class="price-to">до ${fmtMln(d.price_to)}</div>
    </div>

    <div class="info-card">
      <div class="info-card-title">О проекте</div>
      <div class="info-row"><span class="info-label">Застройщик</span><span class="info-val">${d.developer}</span></div>
      <div class="info-row"><span class="info-label">Район</span><span class="info-val">${d.district}</span></div>
      <div class="info-row"><span class="info-label">Этажей</span><span class="info-val">${d.floors}</span></div>
      <div class="info-row"><span class="info-label">Корпусов</span><span class="info-val">${d.buildings.length}</span></div>
      <div class="info-row"><span class="info-label">Сдача</span><span class="info-val">${d.completion}</span></div>
    </div>

    <a class="action-btn primary" href="${d.drive_root}" target="_blank">📂 Google Drive проекта</a>
    <a class="action-btn secondary" href="https://t.me/phuket_proptech_bot" target="_blank">💬 Написать в бот</a>
  `;
}


// ── Meeting mode ─────────────────────────────
let meetingMode = localStorage.getItem('flox-meeting') === 'true';

function applyMeetingMode() {
  const btn = document.getElementById('meetingBtnProj');
  const label = document.getElementById('meetingBtnLabel');
  const logo = document.getElementById('topbarLogo');
  const reward = document.querySelector('.reward-card');

  if (meetingMode) {
    if (btn) btn.classList.add('act');
    if (label) label.textContent = 'Режим встречи';
    if (logo) logo.style.visibility = 'hidden';
    if (reward) reward.style.display = 'none';
  } else {
    if (btn) btn.classList.remove('act');
    if (label) label.textContent = 'Встреча';
    if (logo) logo.style.visibility = 'visible';
    if (reward) reward.style.display = '';
  }
}

function toggleMeeting() {
  meetingMode = !meetingMode;
  localStorage.setItem('flox-meeting', String(meetingMode));
  applyMeetingMode();
}

loadProject();
</script>
</body>
</html>
