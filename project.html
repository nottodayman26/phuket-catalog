<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flox — Проект</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=cyrillic" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --meeting-logo-vis: visible;
  --meeting-reward-display: block;
  --bg: #0d0d18;
  --surface: #111118;
  --surface-2: #1a1a26;
  --surface-3: #222232;
  --line: rgba(255,255,255,0.06);
  --line-2: rgba(255,255,255,0.1);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.45);
  --muted-2: rgba(255,255,255,0.2);
  --accent: #5E17EB;
  --accent-soft: rgba(94,23,235,0.18);
  --green: #7BAF6E;
  --green-soft: rgba(123,175,110,0.15);
  --red: #FF6B6B;
  --project-color: #5E17EB;
  --project-soft: rgba(94,23,235,0.18);
}
body.light {
  --bg: #F5F5F7;
  --surface: #ffffff;
  --surface-2: #f0f0f4;
  --surface-3: #e8e8ee;
  --line: rgba(0,0,0,0.07);
  --line-2: rgba(0,0,0,0.12);
  --text: #111118;
  --muted: rgba(0,0,0,0.45);
  --muted-2: rgba(0,0,0,0.22);
  --accent-soft: rgba(94,23,235,0.1);
  --project-soft: rgba(94,23,235,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: 'Inter', system-ui, sans-serif; scroll-behavior: smooth; }
body { min-height: 100vh; font-family: inherit; background: var(--bg); color: var(--text); transition: background .3s, color .3s; }
a { color: inherit; text-decoration: none; }

/* ── TOP BAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 0.5px solid var(--line);
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 52px;
}
.topbar-back {
  display: flex; align-items: center; gap: 6px;
  color: var(--muted); font-size: 13px; cursor: pointer;
  padding: 6px 10px; border-radius: 8px;
  transition: background .15s, color .15s;
}
.topbar-back:hover { background: var(--surface-2); color: var(--text); }
.topbar-logo {
  font-size: 20px; font-weight: 700; letter-spacing: -0.05em;
  display: flex; align-items: center; gap: 2px;
}
.logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); margin-bottom: 10px; flex-shrink: 0; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.theme-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: none; background: var(--surface-2); color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.theme-btn:hover { background: var(--surface-3); }
.topbar-logo { font-size:20px;font-weight:700;letter-spacing:-0.05em;color:var(--text);cursor:default;visibility:var(--meeting-logo-vis); }
.topbar-nav { display:flex;align-items:center;gap:2px;margin-left:16px; }
.tnav-item {
  padding:5px 12px;border-radius:8px;font-size:13px;font-weight:500;
  color:var(--muted);text-decoration:none;transition:background .15s,color .15s;
}
.tnav-item:hover { background:var(--surface-2);color:var(--text); }
.meeting-btn-proj {
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:8px;border:1px solid var(--line-2);
  background:none;color:var(--muted);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.meeting-btn-proj:hover { border-color:var(--accent);color:var(--accent); }
.meeting-btn-proj.act { background:var(--accent);border-color:var(--accent);color:#fff; }

/* ── HERO ─── */
.hero {
  position: relative; background: #1C1C2E;
  overflow: hidden;
}
.hero-imgs {
  display: flex; gap: 4px; height: 400px;
}
.hero-main {
  flex: 1; overflow: hidden; cursor: pointer; position: relative;
}
.hero-main img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.hero-main:hover img { transform: scale(1.03); }
.hero-side { display: flex; flex-direction: column; gap: 4px; width: 200px; }
.hero-thumb { flex: 1; overflow: hidden; cursor: pointer; position: relative; }
.hero-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.hero-thumb:hover img { transform: scale(1.05); }
.hero-more {
  position: absolute; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 15px; font-weight: 700;
}
.hero-placeholder {
  height: 360px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--muted);
}
.hero-drive-sections {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.hero-drive-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface-3); color: var(--text);
  padding: 7px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
  text-decoration: none; border: 1px solid var(--line-2);
  transition: border-color .15s, background .15s;
}
.hero-drive-btn:hover { border-color: var(--project-color); background: var(--project-soft); }
.hero-drive-btn.primary {
  background: var(--project-color); color: #fff; border-color: var(--project-color);
}

/* ── BODY ─── */
.body-wrap {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 310px; gap: 24px;
  padding: 24px 20px;
}
@media(max-width:900px) {
  .body-wrap { grid-template-columns: 1fr; }
  .sidebar-col { order: -1; }
}

/* ── PROJ HEADER ─── */
.proj-header { margin-bottom: 20px; }
.proj-breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.proj-breadcrumb span { color: var(--project-color); }
.proj-title { font-size: 26px; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 6px; }
.proj-sub { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.proj-badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  background: var(--green-soft); color: var(--green);
}

/* ── TABS ─── */
.tabs-wrap {
  position: sticky; top: 52px; z-index: 90;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
}
.tabs {
  display: flex; gap: 0;
  overflow-x: auto; scrollbar-width: none;
  max-width: 1200px; margin: 0 auto; padding: 0 20px;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 10px 16px; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--text); }
.tab.act { color: var(--project-color); border-bottom-color: var(--project-color); font-weight: 600; }

/* ── PANELS / SECTIONS ─── */
.panel { display: block; }
.page-section {
  padding-top: 52px; padding-bottom: 28px;
  scroll-margin-top: 108px;
}
.page-section + .page-section {
  border-top: 1px solid var(--line);
}

/* ── UNITS ─── */
.units-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.uf-btn {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--line-2); color: var(--muted);
  cursor: pointer; background: none; font-family: inherit;
  transition: all .15s;
}
.uf-btn:hover { border-color: var(--project-color); color: var(--project-color); }
.uf-btn.act { background: var(--project-color); border-color: var(--project-color); color: #fff; }
.units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 12px; }
.unit-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; padding: 16px; cursor: pointer;
  transition: border-color .2s, transform .15s;
}
.unit-card:hover { border-color: var(--project-color); transform: translateY(-2px); }
.unit-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
.unit-type-label { font-size: 13px; font-weight: 600; display: flex; align-items: center; margin-bottom: 12px; }
.unit-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.us-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .04em; }
.us-val { font-size: 13px; font-weight: 600; }
.us-price { color: var(--project-color); }

/* ── UNITS FILTERS ─── */
.units-filters {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end;
}
.uf-group { display: flex; flex-direction: column; gap: 5px; }
.uf-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.uf-select {
  padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--line-2); background: var(--surface-2); color: var(--text);
  font-family: inherit; cursor: pointer; min-width: 130px;
  transition: border-color .15s;
}
.uf-select:focus { outline: none; border-color: var(--project-color); }
.uf-reset {
  padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--line-2); background: none; color: var(--muted);
  font-family: inherit; cursor: pointer; align-self: flex-end;
  transition: all .15s;
}
.uf-reset:hover { border-color: var(--project-color); color: var(--project-color); }

/* ── UNITS TABLE ─── */
.units-table-wrap { overflow-x: auto; }
.units-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.units-table th {
  text-align: left; padding: 8px 12px;
  font-size: 10px; color: var(--muted); border-bottom: 1px solid var(--line);
  text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
  cursor: pointer; user-select: none;
}
.units-table th:hover { color: var(--text); }
.units-table td { padding: 10px 12px; border-bottom: 1px solid var(--line); }
.units-table tr:last-child td { border-bottom: none; }
.units-table tr:hover td { background: var(--surface-2); }
.ut-status-dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px;
}
.ut-available { background: var(--green); }
.ut-sold { background: var(--muted-2); }
.ut-price { color: var(--project-color); font-weight: 600; }
.units-loading { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }
.units-empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }
.units-count { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

/* ── UNITS ACCORDION ─── */
.buildings-list { display: flex; flex-direction: column; gap: 8px; }
.building-block {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden;
  transition: border-color .2s;
}
.building-block:hover { border-color: var(--line-2); }
.building-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; cursor: pointer;
  user-select: none;
}
.building-header:hover { background: var(--surface-2); }
.building-title { display: flex; flex-direction: column; gap: 3px; }
.building-badge {
  font-size: 13px; font-weight: 700; color: var(--text);
}
.building-meta { font-size: 11px; color: var(--muted); }
.building-chevron {
  font-size: 20px; color: var(--muted);
  transition: transform .2s, color .2s;
  line-height: 1;
}
.building-types { padding: 0 16px 14px; }
.unit-row-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-top: 1px solid var(--line);
  flex-wrap: wrap; gap: 8px;
}
.uri-left { display: flex; align-items: center; gap: 8px; min-width: 120px; }
.uri-type { font-size: 13px; font-weight: 600; }
.uri-stats { display: flex; gap: 20px; flex-wrap: wrap; }
.uri-stats > div { text-align: right; }

/* ── SECTION TITLE ─── */
.sec-title {
  font-size: 15px; font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--line); }

/* ── ABOUT ─── */
.desc-text { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 24px; }
.facilities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); gap: 10px; margin-bottom: 24px; }
.fac-item {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; display: flex; align-items: center; gap: 8px;
}
.fac-icon { font-size: 18px; }
.info-box {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; padding: 16px;
}
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); }
.info-val { font-weight: 600; }

/* ── MAP ─── */
.map-wrap { border-radius: 14px; overflow: hidden; border: 1px solid var(--line); margin-bottom: 20px; }
.nearby-list { display: flex; flex-direction: column; gap: 8px; }
.nearby-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 11px 14px;
  cursor: pointer; transition: border-color .15s, background .15s;
}
.nearby-item:hover { border-color: var(--project-color); background: var(--surface-2); }
.nearby-icon { font-size: 20px; width: 30px; text-align: center; }
.nearby-name { font-size: 13px; font-weight: 500; flex: 1; }
.nearby-dist { text-align: right; }
.nearby-dist-val { font-size: 12px; font-weight: 600; }
.nearby-time { font-size: 11px; color: var(--muted); }

/* ── PAYMENT ─── */
.ps-timeline {
  display: flex; align-items: flex-start;
  margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px;
}
.ps-step { flex: 1; min-width: 70px; text-align: center; position: relative; }
.ps-step::before {
  content: ''; display: block; height: 3px;
  background: var(--line-2);
  position: absolute; top: 13px; left: 50%; right: -50%;
}
.ps-step:last-child::before { display: none; }
.ps-dot {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--project-color); color: #fff;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 6px; position: relative; z-index: 1;
}
.ps-step-label { font-size: 9px; color: var(--muted); line-height: 1.3; }
.ps-table { width: 100%; border-collapse: collapse; }
.ps-table th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--line);
  text-transform: uppercase; letter-spacing: .05em;
}
.ps-table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--line); }
.ps-table tr:last-child td { border-bottom: none; }
.ps-pct { font-weight: 700; color: var(--project-color); font-size: 15px; }

/* ── MAINTENANCE ─── */
.maint-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 0; border-bottom: 1px solid var(--line); font-size: 13px;
}
.maint-row:last-child { border-bottom: none; }
.maint-label { color: var(--muted); }
.maint-val { font-weight: 600; }
.maint-note {
  margin-top: 14px; padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; font-size: 12px; color: var(--muted); line-height: 1.6;
}

/* ── FILES ─── */
.files-list { display: flex; flex-direction: column; gap: 8px; }
.file-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 13px 16px;
  text-decoration: none; color: var(--text);
  transition: border-color .15s, background .15s;
}
.file-item:hover { border-color: var(--project-color); background: var(--surface-2); }
.file-item.highlight { border-color: var(--project-color); }
.file-icon { font-size: 22px; }
.file-name { font-size: 13px; font-weight: 500; flex: 1; }
.file-type { font-size: 11px; color: var(--muted); background: var(--surface-2); padding: 2px 7px; border-radius: 5px; }
.file-arrow { color: var(--muted); }

/* ── SIDEBAR ─── */
.sidebar-col { display: flex; flex-direction: column; gap: 14px; }

.reward-card {
  background: var(--surface);
  border: 1px solid var(--project-color);
  border-radius: 14px; padding: 18px;
  position: relative; overflow: hidden;
  display: var(--meeting-reward-display);
}
.reward-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, #5E17EB, #9B7FD4);
}
.reward-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.reward-pct { font-size: 38px; font-weight: 700; color: var(--project-color); line-height: 1; }
.reward-pct sup { font-size: 18px; font-weight: 400; }
.reward-tbd { font-size: 14px; color: var(--muted); margin-top: 4px; }
.reward-rows { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
.reward-row { display: flex; justify-content: space-between; font-size: 12px; }
.reward-row-label { color: var(--muted); }
.reward-row-val { font-weight: 600; }
.reward-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

.price-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 18px;
}
.price-from-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.price-from-val { font-size: 24px; font-weight: 700; color: var(--project-color); }
.price-to { font-size: 13px; color: var(--muted); margin-top: 2px; }

.info-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 18px;
}
.info-card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

.action-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 13px; border-radius: 12px;
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; border: none; transition: opacity .2s, transform .1s;
  text-decoration: none;
}
.action-btn:active { transform: scale(0.98); }
.action-btn.primary { background: var(--project-color); color: #fff; }
.action-btn.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--line-2); }
.action-btn:hover { opacity: 0.85; }

/* ── LIGHTBOX ─── */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lb-img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: 8px; }
.lb-close {
  position: absolute; top: 16px; right: 20px;
  color: #fff; font-size: 28px; cursor: pointer; line-height: 1;
  background: rgba(0,0,0,0.4); border: none; border-radius: 8px;
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
}
.lb-prev, .lb-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  color: #fff; font-size: 22px; cursor: pointer;
  background: rgba(0,0,0,0.5); border: none; border-radius: 50%;
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.lb-prev:hover, .lb-next:hover { background: rgba(0,0,0,0.8); }
.lb-prev { left: 16px; }
.lb-next { right: 16px; }
.lb-counter {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.7); font-size: 12px;
  background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px;
}

/* ── UTILS ─── */
.spinner {
  width: 30px; height: 30px; border-radius: 50%;
  border: 3px solid var(--line-2); border-top-color: var(--project-color);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading { display: flex; align-items: center; justify-content: center; height: 200px; flex-direction: column; gap: 12px; color: var(--muted); font-size: 14px; }
</style>
<script>
// Instant meeting mode — prevents flash before JS loads
(function(){
  if (localStorage.getItem("flox-meeting") === "true") {
    document.documentElement.style.setProperty("--meeting-logo-vis", "hidden");
    document.documentElement.style.setProperty("--meeting-reward-display", "none");
  }
})();
</script>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">

<script>
const fmt = n => new Intl.NumberFormat('ru-RU').format(n);
const fmtMln = n => n >= 1000000 ? (n/1000000).toFixed(1).replace('.0','') + ' млн ฿' : fmt(n) + ' ฿';
let lbPhotos = [], lbIdx = 0;
function openLightbox(photos, idx) {
  lbPhotos = photos; lbIdx = idx;
  document.getElementById('lightbox').classList.add('open');
  updateLb();
  document.addEventListener('keydown', lbKey);
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lbKey);
}
function lbNav(dir) { lbIdx = (lbIdx + dir + lbPhotos.length) % lbPhotos.length; updateLb(); }
function updateLb() {
  document.getElementById('lbImg').src = lbPhotos[lbIdx];
  document.getElementById('lbCounter').textContent = `${lbIdx+1} / ${lbPhotos.length}`;
}
function lbKey(e) {
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'Escape') closeLightbox();
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

// Маппинг room_type из базы → наши категории
function mapRoomType(rt) {
  if (!rt) return 'Другое';
  const r = rt.toUpperCase();
  if (r.startsWith('PH') || r.includes('PENTHOUSE')) return 'Пентхаус';
  if (r.includes('2 BEDROOM')) return '2 спальни';
  if (r.includes('1 BEDROOM PLUS') || r.includes('1 BEDROOM+')) return '1 спальня+';
  if (r.includes('1 BEDROOM')) return '1 спальня';
  if (r.includes('STUDIO')) return 'Студия';
  return rt;
}

let _sortCol = 'selling_price', _sortDir = 1;

async function loadUnits(d) {
  try {
    // Получаем project_id из таблицы projects по коду
    const projRes = await fetch(`${SB_URL}/projects?code=eq.${d.id}&select=id`, { headers: SB_HEADERS });
    const projData = await projRes.json();
    if (!projData.length) return;
    const projectId = projData[0].id;

    const res = await fetch(
      `${SB_URL}/units?project_id=eq.${projectId}&select=room_no,tower,floor,room_type,area_sqm,selling_price,status&order=selling_price.asc&limit=1000`,
      { headers: SB_HEADERS }
    );
    _allUnits = await res.json();

    // Добавляем категорию
    _allUnits.forEach(u => u._category = mapRoomType(u.room_type));

    // Обновляем мета-инфо корпусов
    d.buildings.forEach((b, bi) => {
      const bUnits = _allUnits.filter(u => u.tower === b);
      const avail = bUnits.filter(u => u.status === 'available').length;
      const meta = document.getElementById('bmeta-' + bi);
      if (meta) meta.textContent = `${avail} доступно · ${bUnits.length} всего`;
    });

    // Показываем фильтры и таблицу
    document.getElementById('units-filters-wrap').style.display = 'block';
    document.getElementById('units-accordion-wrap').style.display = 'none';
    applyUnitFilters();

  } catch(e) {
    console.error('Units load error:', e);
  }
}

function applyUnitFilters() {
  const type = document.getElementById('uf-type')?.value || '';
  const price = document.getElementById('uf-price')?.value || '';
  const status = document.getElementById('uf-status')?.value || '';

  let filtered = _allUnits.filter(u => {
    if (type && u._category !== type) return false;
    if (price && u.selling_price > parseFloat(price)) return false;
    if (status && u.status !== status) return false;
    return true;
  });

  // Сортировка
  filtered.sort((a, b) => {
    let av = a[_sortCol], bv = b[_sortCol];
    if (typeof av === 'string') return _sortDir * av.localeCompare(bv);
    return _sortDir * ((av || 0) - (bv || 0));
  });

  const count = document.getElementById('units-count');
  if (count) count.textContent = `Показано ${filtered.length} юнитов`;

  const tbody = document.getElementById('units-tbody');
  if (!tbody) return;

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="units-empty">Нет юнитов по выбранным фильтрам</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(u => `
    <tr>
      <td style="font-weight:600">${u.room_no}</td>
      <td>${u.tower}</td>
      <td>${u.floor}</td>
      <td>${u._category}</td>
      <td style="color:var(--muted);font-size:12px">${u.room_type}</td>
      <td>${u.area_sqm} м²</td>
      <td class="ut-price">${fmtMln(u.selling_price)}</td>
      <td>
        <span class="ut-status-dot ${u.status === 'available' ? 'ut-available' : 'ut-sold'}"></span>
        ${u.status === 'available' ? 'Доступен' : 'Продан'}
      </td>
    </tr>`).join('');
}

function sortUnits(col) {
  if (_sortCol === col) _sortDir *= -1;
  else { _sortCol = col; _sortDir = 1; }
  applyUnitFilters();
}

function resetUnitFilters() {
  document.getElementById('uf-type').value = '';
  document.getElementById('uf-price').value = '';
  document.getElementById('uf-status').value = 'available';
  applyUnitFilters();
}

function renderMap(d) {
  const { lat, lng } = d.coords;
  const mapId = 'map-' + Date.now();
  setTimeout(() => {
    if (window._mapInstance) { window._mapInstance.remove(); window._mapInstance = null; }

    const map = L.map(mapId, { zoomControl: true, scrollWheelZoom: false }).setView([lat, lng], 15);
    window._mapInstance = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Брендированная метка
    const floxIcon = L.divIcon({
      html: `<div style="
        background:var(--project-color,#5E17EB);
        color:#fff;font-size:11px;font-weight:700;
        padding:5px 10px;border-radius:20px;
        white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3);
        display:flex;align-items:center;gap:4px;
      ">🏢 ${d.name}</div>`,
      className: '', iconAnchor: [0, 0]
    });
    L.marker([lat, lng], { icon: floxIcon }).addTo(map);

    // Метки ближайших локаций
    window._nearbyMarkers = {};
    d.nearby.forEach((n, i) => {
      if (!n.lat || !n.lng) return;
      const icon = L.divIcon({
        html: `<div style="font-size:22px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4))">${n.icon}</div>`,
        className: '', iconAnchor: [11, 11]
      });
      const marker = L.marker([n.lat, n.lng], { icon }).addTo(map)
        .bindPopup(`<b>${n.name}</b><br>${n.dist} · ${n.time}`);
      window._nearbyMarkers[i] = marker;
    });
  }, 50);

  return `
    <div class="sec-title">Карта</div>
    <div id="${mapId}" style="height:340px;border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-bottom:20px;"></div>
    <div class="sec-title">Ближайшие локации</div>
    <div class="nearby-list">
      ${d.nearby.map((n, i) => `
        <div class="nearby-item" onclick="focusNearby(${i}, ${n.lat||0}, ${n.lng||0})">
          <span class="nearby-icon">${n.icon}</span>
          <span class="nearby-name">${n.name}</span>
          <div class="nearby-dist">
            <div class="nearby-dist-val">${n.dist}</div>
            <div class="nearby-time">${n.time}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function focusNearby(idx, lat, lng) {
  if (!window._mapInstance) return;
  if (lat && lng) {
    window._mapInstance.flyTo([lat, lng], 16, { duration: 1 });
    if (window._nearbyMarkers && window._nearbyMarkers[idx]) {
      window._nearbyMarkers[idx].openPopup();
    }
  }
}

            <td>${p.note}</td>
            <td style="text-align:right"><span class="ps-pct">${p.percent}%</span></td>
          </tr>`).join('')}
      </tbody>
      <tfoot><tr>
        <td colspan="2" style="padding:12px 14px;font-size:12px;color:var(--muted)">Итого</td>
        <td style="text-align:right;padding:12px 14px;font-weight:700">${total}%</td>
      </tr></tfoot>
    </table>`;
}

function renderMaint(d) {
  const m = d.maintenance;
  const cfAmt = m.common_fee.amount === 0 ? 'уточняется' : `${m.common_fee.amount} ${m.common_fee.unit}`;
  const sfAmt = m.sinking_fund.amount === 0 ? 'уточняется' : `${m.sinking_fund.amount} ${m.sinking_fund.unit}`;
  const noteHtml = (m.notes && m.notes !== 'Данные уточняются') ? `<div class="maint-note">${m.notes}</div>` : '';
  return `
    <div class="sec-title">Обслуживание</div>
    <div>
      <div class="maint-row"><span class="maint-label">Common fee</span><span class="maint-val">${cfAmt}</span></div>
      <div class="maint-row"><span class="maint-label">Sinking fund</span><span class="maint-val">${sfAmt}</span></div>
      <div class="maint-row"><span class="maint-label">Регистрация — Фрихолд</span><span class="maint-val">${m.registration.freehold}</span></div>
      <div class="maint-row"><span class="maint-label">Регистрация — Лизхолд</span><span class="maint-val">${m.registration.leasehold}</span></div>
    </div>
    ${noteHtml}`;
}

function renderFiles(d) {
  const icons = { pdf:'📄', folder:'📁', link:'🔗' };
  return `
    <div class="sec-title">Файлы проекта</div>
    <div class="files-list">
      ${d.files.map(f => `
        <a class="file-item" href="${f.url}" target="_blank">
          <span class="file-icon">${icons[f.type]||'📄'}</span>
          <span class="file-name">${f.name}</span>
          <span class="file-type">${f.type.toUpperCase()}</span>
          <span class="file-arrow">↗</span>
        </a>`).join('')}
      <a class="file-item highlight" href="${d.drive_root}" target="_blank">
        <span class="file-icon">🗂️</span>
        <span class="file-name">Весь Google Drive проекта</span>
        <span class="file-arrow">↗</span>
      </a>
    </div>`;
}

function renderSidebar(d) {
  const r = d.agent_reward;
  const pctHtml = r.percent_from === 0
    ? `<div class="reward-tbd">уточняется</div>`
    : `<div class="reward-pct">${r.percent_from}–${r.percent_to}<sup>%</sup></div>`;
  const daysHtml = (!r.payment_days || r.payment_days === 0) ? "уточняется" : `${r.payment_days} дней`;
  const scaleHtml = r.scale === 'уточняется' ? 'уточняется' : r.scale;

  document.getElementById('sidebarCol').innerHTML = `
    <div class="reward-card">
      <div class="reward-label">🎯 Ваше вознаграждение</div>
      ${pctHtml}
      <div class="reward-rows">
        <div class="reward-row"><span class="reward-row-label">Шкала</span><span class="reward-row-val">${scaleHtml}</span></div>
        <div class="reward-row"><span class="reward-row-label">Срок выплаты</span><span class="reward-row-val">${daysHtml}</span></div>
      </div>
      <div class="reward-note">${r.note}</div>
    </div>

    <div class="price-card">
      <div class="price-from-label">Цена от</div>
      <div class="price-from-val">${fmtMln(d.price_from)}</div>
      <div class="price-to">до ${fmtMln(d.price_to)}</div>
    </div>

    <div class="info-card">
      <div class="info-card-title">О проекте</div>
      <div class="info-row"><span class="info-label">Застройщик</span><span class="info-val">${d.developer}</span></div>
      <div class="info-row"><span class="info-label">Район</span><span class="info-val">${d.district}</span></div>
      <div class="info-row"><span class="info-label">Этажей</span><span class="info-val">${d.floors}</span></div>
      <div class="info-row"><span class="info-label">Корпусов</span><span class="info-val">${d.buildings.length}</span></div>
      <div class="info-row"><span class="info-label">Сдача</span><span class="info-val">${d.completion}</span></div>
    </div>

    </div>
  `;
}


// ── Meeting mode ─────────────────────────────
let meetingMode = localStorage.getItem('flox-meeting') === 'true';

function applyMeetingMode() {
  const btn = document.getElementById('meetingBtnProj');
  const label = document.getElementById('meetingBtnLabel');

  if (meetingMode) {
    if (btn) btn.classList.add('act');
    if (label) label.textContent = 'Режим встречи';
    document.documentElement.style.setProperty('--meeting-logo-vis', 'hidden');
    document.documentElement.style.setProperty('--meeting-reward-display', 'none');
  } else {
    if (btn) btn.classList.remove('act');
    if (label) label.textContent = 'Встреча';
    document.documentElement.style.setProperty('--meeting-logo-vis', 'visible');
    document.documentElement.style.setProperty('--meeting-reward-display', 'block');
  }
}

function toggleMeeting() {
  meetingMode = !meetingMode;
  localStorage.setItem('flox-meeting', String(meetingMode));
  applyMeetingMode();
}

loadProject();
</script>
</body>
</html>
