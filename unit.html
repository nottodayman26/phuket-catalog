<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flox — Юнит</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=cyrillic" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --bg:#0d0d18;--surface:#111118;--surface-2:#1a1a26;--surface-3:#222232;
  --line:rgba(255,255,255,0.06);--line-2:rgba(255,255,255,0.1);
  --text:#ffffff;--muted:rgba(255,255,255,0.45);
  --accent:#5E17EB;--accent-soft:rgba(94,23,235,0.18);
  --green:#7BAF6E;--red:#FF6B6B;--red-soft:rgba(255,107,107,0.15);
  --project-color:#5E17EB;
}
body.light{
  --bg:#F5F5F7;--surface:#ffffff;--surface-2:#F5F5F7;--surface-3:#EBEBED;
  --line:rgba(0,0,0,0.06);--line-2:rgba(0,0,0,0.1);
  --text:#1a1a1a;--muted:rgba(0,0,0,0.45);
  --accent:#5E17EB;--accent-soft:rgba(94,23,235,0.1);
  --green:#3B7A2E;--red:#D94040;--red-soft:rgba(217,64,64,0.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}


/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 24px;font-size:12px;color:var(--muted);border-bottom:0.5px solid var(--line)}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .15s}
.breadcrumb a:hover{color:var(--text)}
.breadcrumb .cur{color:var(--text)}

/* ── LAYOUT ── */
.page-body{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 104px)}
.main{padding:24px;display:flex;flex-direction:column;gap:20px;border-right:0.5px solid var(--line)}
.sidebar{padding:20px;display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 104px);overflow-y:auto;position:sticky;top:104px}

/* ── UNIT HEADER ── */
.unit-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.unit-project-name{font-size:28px;font-weight:700;margin-bottom:4px;color:var(--text)}
.unit-name{font-size:15px;font-weight:600;color:var(--muted)}
.unit-meta{font-size:13px;color:var(--muted)}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-avail{background:rgba(123,175,110,0.15);color:var(--green)}
.badge-sold{background:var(--red-soft);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%}

/* ── ACTIONS ── */
.actions{display:flex;gap:8px;flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:0.5px solid var(--line-2);background:var(--surface);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.act-btn:hover{border-color:var(--text);color:var(--text)}

/* ── TWO-COL ── */
.two-col{display:block}

/* ── PLAN ── */
.plan-card{background:var(--surface);border:0.5px solid var(--line-2);border-radius:12px;overflow:hidden;position:relative;min-height:600px;display:flex;align-items:center;justify-content:center}
.plan-card img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
.plan-placeholder{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted)}
.plan-placeholder i{font-size:56px}
.plan-placeholder span{font-size:13px}

/* ── PARAMS ── */
.params-card{background:var(--surface);border:0.5px solid var(--line-2);border-radius:12px;overflow:hidden}
.p-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:0.5px solid var(--line);font-size:13px}
.p-row:last-child{border-bottom:none}
.p-label{color:var(--muted)}
.p-val{font-weight:500}

/* ── SIDEBAR CARDS ── */
.sc{background:var(--surface);border:0.5px solid var(--line-2);border-radius:12px;padding:14px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease}
.sc:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.sc.accent-border{border-color:rgba(94,23,235,0.5)}
.sc-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.sc-price{font-size:26px;font-weight:700;margin-bottom:2px}
.sc-price-exact{font-size:12px;color:var(--muted);margin-bottom:11px}
.sc-row{display:flex;justify-content:space-between;font-size:12px;padding:9px 0;border-bottom:0.5px solid var(--line)}
.sc-row:last-child{border-bottom:none}
.sc-row span{color:var(--muted)}
.sc-row b{font-weight:600;color:var(--text)}
.sc-row .green{color:var(--green)}
.sc-row .red{color:var(--red)}

.rew-pct{font-size:26px;font-weight:700;margin:4px 0 8px}
.rew-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.rew-row span{color:var(--muted)}
.rew-row b{font-weight:500}
.rew-btn{display:block;width:100%;padding:8px;border-radius:8px;border:0.5px solid var(--line-2);background:none;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;margin-top:10px;font-family:inherit;transition:all .15s}
.rew-btn:hover{color:var(--text);border-color:var(--line)}

/* ── ADD TO PRESENTATION ── */
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.book-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:10px;background:none;color:var(--text);border:0.5px solid var(--line-2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:8px}
.book-btn:hover{border-color:var(--line);background:var(--surface-2)}
.add-btn:hover{opacity:.88}
.add-btn.added{background:var(--green);opacity:1}

.proj-info{display:flex;flex-direction:column;gap:7px;padding:2px 0}
.proj-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.proj-row i{font-size:14px;flex-shrink:0}
.proj-row a{color:var(--muted);text-decoration:none}
.proj-row a:hover{color:var(--text)}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;min-height:300px}
.spinner{width:28px;height:28px;border:2px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="flox-topbar" data-page="unit"></div>

<div class="breadcrumb" id="breadcrumb">
  <a href="flox-web.html">Поиск</a>
  <i class="ti ti-chevron-right" style="font-size:11px"></i>
  <a href="#" id="bc-project">—</a>
  <i class="ti ti-chevron-right" style="font-size:11px"></i>
  <span class="cur" id="bc-unit">—</span>
</div>

<div class="page-body">
  <div class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div></div>
  </div>
  <div class="sidebar" id="sidebarContent">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lqhuegdwglzkfzjcfxdx.supabase.co/rest/v1';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxaHVlZ2R3Z2x6a2Z6amNmeGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjA5NjIsImV4cCI6MjA5NzM5Njk2Mn0.egEtZ5Av8tAD_Y6tKtWowxpbHoCiDezWEG5gWpEYNpo';
const SB = { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`, Accept: 'application/json' };


// ── PARAMS ─────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const roomNo = params.get('unit');
const projectId = params.get('project');

function fmtMln(v) {
  const m = v / 1000000;
  return m >= 10 ? m.toFixed(1) + ' млн ฿' : m.toFixed(2).replace(/\.?0+$/, '') + ' млн ฿';
}

// ── LOAD ────────────────────────────────────────────────────────────────────
async function loadUnit() {
  if (!roomNo) { showError('Юнит не указан'); return; }

  try {
    // 1. Загружаем юнит
    const r = await fetch(`${SUPABASE_URL}/units?room_no=eq.${encodeURIComponent(roomNo)}&limit=1`, { headers: SB });
    const rows = await r.json();
    if (!rows.length) {
      // Пробуем без encodeURIComponent на случай двойного кодирования
      const r2 = await fetch(`${SUPABASE_URL}/units?room_no=eq.${roomNo}&limit=1`, { headers: SB });
      const rows2 = await r2.json();
      if (!rows2.length) { showError('Юнит не найден: ' + roomNo); return; }
      return processUnit(rows2[0]);
    }
    processUnit(rows[0]);
  } catch(e) {
    showError('Ошибка загрузки: ' + e.message);
  }
}

async function processUnit(u) {
  // 2. Загружаем проект из Supabase по project_id
  let proj = { code: projectId || '', name: '' };
  if (u.project_id) {
    try {
      const pr = await fetch(`${SUPABASE_URL}/projects?id=eq.${u.project_id}&limit=1`, { headers: SB });
      const pd = await pr.json();
      if (pd.length) proj = pd[0];
    } catch(e) {}
  }

  // 3. Загружаем JSON проекта для доп. данных
  let projData = null;
  const code = proj.code || projectId || '';
  if (code) {
    try {
      const base = location.pathname.replace(/\/[^\/]*$/, '/');
      const pj = await fetch(`${base}projects/${code}.json`);
      if (pj.ok) projData = await pj.json();
    } catch(e) {}
  }

  renderUnit(u, proj, projData);
}

function renderUnit(u, proj, pd) {
  const isAvail = u.status === 'available';
  const projectColor = pd?.color || proj.color || '#5E17EB';
  document.documentElement.style.setProperty('--project-color', projectColor);

  // Хлебные крошки
  document.getElementById('bc-project').textContent = proj.name || proj.code;
  document.getElementById('bc-project').href = `project.html?id=${proj.code}`;
  document.getElementById('bc-unit').textContent = u.room_no;
  document.title = `Flox — ${u.room_no}`;

  // Тип (категория)
  const rt = (u.room_type || '').toUpperCase();
  let cat = u.room_type;
  if (rt.includes('PENTHOUSE') || rt.includes('PH-')) cat = 'Пентхаус';
  else if (rt.includes('2 BEDROOM')) cat = '2 спальни';
  else if (rt.includes('1 BEDROOM PLUS')) cat = '1 спальня+';
  else if (rt.includes('1 BEDROOM')) cat = '1 спальня';

  // Вознаграждение
  const reward = pd?.agent_reward || {};
  const pct = (reward.percent_from && reward.percent_from > 0) ? reward.percent_from : 10;
  const scale = (!reward.scale || reward.scale === 'уточняется') ? 'Фикс' : reward.scale;
  const days = (!reward.payment_days || reward.payment_days === 0) ? '30 дней' : `${reward.payment_days} дней`;

  // MAIN
  document.getElementById('mainContent').innerHTML = `
    <div class="unit-header">
      <div>
        <div class="unit-project-name">${proj.name || proj.code}</div>
        <div class="unit-name">${u.room_no} · ${cat}</div>
      </div>
    </div>

    <div class="actions">
      <button class="act-btn" onclick="window.open('project.html?id=${proj.code}','_blank')">
        <i class="ti ti-building"></i> Страница проекта
      </button>
      <button class="act-btn" onclick="window.print()">
        <i class="ti ti-printer"></i> Печать
      </button>
      <div class="status-badge ${isAvail ? 'badge-avail' : 'badge-sold'}" style="margin-left:auto">
        <div class="dot" style="background:${isAvail ? 'var(--green)' : 'var(--red)'}"></div>
        ${isAvail ? 'Свободен' : 'Продан'}
      </div>
    </div>

    <div class="two-col">
      <div class="plan-card" id="planCard">
        <div class="plan-placeholder">
          <i class="ti ti-layout-2"></i>
          <span>Планировка появится позже</span>
        </div>
      </div>
    </div>
  `;

  // SIDEBAR
  document.getElementById('sidebarContent').innerHTML = `
    <div class="sc">
      <div class="sc-label">Цена</div>
      <div class="sc-price">${fmtMln(u.selling_price)}</div>
      <div class="sc-price-exact">${Math.round(u.selling_price).toLocaleString('ru')} ฿</div>
      <div class="sc-row"><span>Проект</span><b>${proj.name || proj.code}</b></div>
      <div class="sc-row"><span>Корпус</span><b>${u.tower}</b></div>
      <div class="sc-row"><span>Этаж</span><b>${u.floor}${pd ? ' / ' + pd.floors : ''}</b></div>
      <div class="sc-row"><span>Тип</span><b>${cat}</b></div>
      <div class="sc-row"><span>Площадь</span><b>${u.area_sqm} м²</b></div>
      <div class="sc-row"><span>За м²</span><b>${u.price_per_sqm ? Math.round(u.price_per_sqm).toLocaleString('ru') + ' ฿' : '—'}</b></div>
      <div class="sc-row"><span>Номер</span><b>${u.room_no}</b></div>
      <div class="sc-row"><span>Статус</span><b class="${isAvail ? 'green' : 'red'}">${isAvail ? 'Свободен' : 'Продан'}</b></div>
    </div>

    <div class="sc accent-border reward-section">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="sc-label" style="margin:0">Вознаграждение</div>
        <span style="font-size:14px">💰</span>
      </div>
      <div class="rew-pct">${pct}%</div>
      <div class="rew-row"><span>Шкала</span><b>${scale}</b></div>
      <div class="rew-row"><span>Срок выплаты</span><b>${days}</b></div>
      <button class="rew-btn" onclick="return false">💵 Таблица вознаграждений</button>
    </div>

    <button class="add-btn" id="addBtn" onclick="togglePresentation()">
      <i class="ti ti-presentation" style="font-size:16px"></i>
      <span id="addBtnLabel">Добавить в презентацию</span>
    </button>

    <button class="book-btn" onclick="return false">
      <i class="ti ti-calendar-check" style="font-size:16px"></i>
      Забронировать
    </button>

    <div class="proj-info">
      <div class="proj-row">
        <i class="ti ti-building-estate"></i>
        <a href="project.html?id=${proj.code}">${proj.name || proj.code}</a>
      </div>
      ${pd ? `<div class="proj-row"><i class="ti ti-calendar"></i>${pd.completion}</div>` : ''}
      ${pd ? `<div class="proj-row"><i class="ti ti-map-pin"></i>${pd.districtRu || pd.district}, Пхукет</div>` : ''}
    </div>
  `;

  // Применяем режим встречи ПОСЛЕ того как DOM отрендерен
  const _m = localStorage.getItem('flox-meeting') === 'true';
  document.querySelectorAll('.reward-section').forEach(el => el.style.display = _m ? 'none' : '');
  initPresentation();
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">${msg}</div>`;
  document.getElementById('sidebarContent').innerHTML = '';
}

// ── ПРЕЗЕНТАЦИЯ ────────────────────────────────────────────────────────────
function getPresentation() {
  try { return JSON.parse(localStorage.getItem('flox-presentation') || '[]'); } catch(e) { return []; }
}
function savePresentation(list) {
  localStorage.setItem('flox-presentation', JSON.stringify(list));
}
function initPresentation() {
  const list = getPresentation();
  const inList = list.some(u => u.room_no === roomNo);
  const btn = document.getElementById('addBtn');
  const lbl = document.getElementById('addBtnLabel');
  if (!btn) return;
  if (inList) {
    btn.classList.add('added');
    if (lbl) lbl.textContent = '✓ В презентации';
  }
}
function togglePresentation() {
  let list = getPresentation();
  const btn = document.getElementById('addBtn');
  const lbl = document.getElementById('addBtnLabel');
  const inList = list.some(u => u.room_no === roomNo);
  if (inList) {
    list = list.filter(u => u.room_no !== roomNo);
    btn.classList.remove('added');
    if (lbl) lbl.textContent = 'Добавить в презентацию';
  } else {
    list.push({ room_no: roomNo, project: projectId });
    btn.classList.add('added');
    if (lbl) lbl.textContent = '✓ В презентации';
  }
  savePresentation(list);
}

// Callback от topbar — скрываем вознаграждение при переключении встречи
window._pageMeetingCallback = function(m) {
  document.querySelectorAll('.reward-section').forEach(el => el.style.display = m ? 'none' : '');
};

loadUnit();
</script>
<script src="topbar.js"></script>
<script>floxTopbar.init({activePage:'unit'});</script>
</body>
</html>
