<style>
  :root{
    --bg:#1b1815;
    --surface:#242019;
    --surface-2:#2c2620;
    --line:#3a332a;
    --text:#ede7dd;
    --muted:#9c9388;
    --muted-2:#6e6659;
    --accent:#d98e4a;
    --accent-text:#241a0e;
    --sold:#6e6659;
    --vik:#c9a24b;
    --kat:#7e8f5c;
    --ban:#6f93c0;
    --oln:#8fa86b;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:none;
    padding-bottom:110px;
  }
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;}

  /* ── header ───────────────────────────────────────────── */
  .topbar{
    display:flex;align-items:center;gap:10px;
    padding:14px 16px 10px;
  }
  .avatar{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#8a5a26);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:14px;color:var(--accent-text);
    flex-shrink:0;
  }
  .who{flex:1;min-width:0;}
  .who .name{font-weight:700;font-size:14px;line-height:1.2;}
  .who .agency{color:var(--muted);font-size:12px;line-height:1.2;}
  .cart-btn{
    position:relative;width:38px;height:38px;border-radius:50%;
    background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    color:var(--text);flex-shrink:0;
  }
  .cart-btn svg{width:18px;height:18px;}
  .cart-badge{
    position:absolute;top:-4px;right:-4px;min-width:17px;height:17px;
    background:var(--accent);color:var(--accent-text);
    border-radius:9px;font-size:10px;font-weight:800;
    display:flex;align-items:center;justify-content:center;padding:0 4px;
    font-family:'IBM Plex Mono',monospace;
  }

  /* ── живой тикер продаж (signature element) ─────────────── */
  .sticky-head{position:sticky;top:0;z-index:6;background:var(--bg);}
  .ticker-wrap{
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    background:var(--surface);overflow:hidden;white-space:nowrap;
    padding:7px 0;height:34px;
  }
  .ticker-track{
    display:inline-flex;gap:28px;animation:scrollTicker 26s linear infinite;padding-left:16px;
    will-change:transform;
  }
  .ticker-wrap:hover .ticker-track{animation-play-state:paused;}
  @keyframes scrollTicker{from{transform:translate3d(0,0,0);}to{transform:translate3d(-50%,0,0);}}
  .tick{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);white-space:nowrap;}
  .tick .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .tick b{color:var(--text);font-family:'IBM Plex Mono',monospace;font-weight:500;}
  .tick .ago{color:var(--muted-2);}

  /* ── фильтры ─────────────────────────────────────────────── */
  .filters{
    padding:12px 0 8px;border-bottom:1px solid var(--line);
  }
  .chip-row{display:flex;gap:7px;overflow-x:auto;padding:0 16px 9px;scrollbar-width:none;}
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:700;
    border:1px solid var(--line);background:var(--surface);color:var(--muted);
    display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;
    transition:background .15s,color .15s,border-color .15s;
  }
  .chip .sw{width:8px;height:8px;border-radius:50%;}
  .chip.active{background:var(--text);color:#1b1815;border-color:var(--text);}
  .chip.active.proj-VIK{background:var(--vik);border-color:var(--vik);color:#241a0e;}
  .chip.active.proj-KAT{background:var(--kat);border-color:var(--kat);color:#10160a;}
  .chip.active.proj-BAN{background:var(--ban);border-color:var(--ban);color:#0e1620;}
  .chip.active.proj-OLN{background:var(--oln);border-color:var(--oln);color:#10160a;}
  .sort-btn{
    margin-left:auto;display:flex;align-items:center;gap:4px;
  }
  .row2{display:flex;align-items:center;padding:0 16px;gap:7px;}

  .count-line{
    padding:9px 16px 4px;font-size:12px;color:var(--muted);
    display:flex;justify-content:space-between;
  }

  /* ── список юнитов ───────────────────────────────────────── */
  .list{padding:2px 12px 0;}
  .unit{
    display:flex;align-items:center;gap:10px;
    background:var(--surface);border-radius:var(--radius);
    padding:11px 11px 11px 0;margin-bottom:8px;position:relative;overflow:hidden;
    border:1px solid var(--line);
  }
  .unit.sold{opacity:.52;}
  .bar{width:4px;align-self:stretch;border-radius:4px;margin-left:0;flex-shrink:0;}
  .ubox{flex:1;min-width:0;padding-left:11px;}
  .u-top{display:flex;align-items:baseline;gap:7px;}
  .u-code{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;}
  .u-proj{font-size:11px;color:var(--muted);}
  .u-mid{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .u-bottom{display:flex;align-items:baseline;gap:8px;margin-top:5px;}
  .price{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;}
  .ppsqm{font-size:11px;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;}
  .pick{
    width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);
    flex-shrink:0;margin-right:12px;display:flex;align-items:center;justify-content:center;
  }
  .unit.selected{border-color:var(--accent);}
  .unit.selected .pick{background:var(--accent);border-color:var(--accent);}
  .unit.selected .pick svg{display:block;}
  .pick svg{display:none;width:13px;height:13px;color:var(--accent-text);}
  .sold-tag{
    font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;padding:4px 8px;margin-right:12px;flex-shrink:0;
  }

  .empty{
    text-align:center;padding:60px 30px;color:var(--muted);font-size:13.5px;line-height:1.5;
  }

  /* ── нижняя плавающая панель ─────────────────────────────── */
  .cartbar{
    position:fixed;left:12px;right:12px;bottom:14px;
    background:var(--accent);color:var(--accent-text);
    border-radius:16px;padding:13px 16px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 10px 26px rgba(0,0,0,.4);
    transform:translateY(120%);transition:transform .25s ease;
    z-index:10;
  }
  .cartbar.show{transform:translateY(0);}
  .cartbar .l b{font-family:'IBM Plex Mono',monospace;}
  .cartbar .l{font-size:12.5px;line-height:1.3;}
  .cartbar .l .sum{font-weight:800;font-size:14.5px;font-family:'IBM Plex Mono',monospace;}
  .cartbar button{
    background:var(--accent-text);color:#f3e3cf;border:none;border-radius:11px;
    padding:10px 14px;font-weight:800;font-size:13px;font-family:'Manrope',sans-serif;
  }

  /* ── модалка предложения ─────────────────────────────────── */
  .sheet-bg{
    position:fixed;inset:0;background:rgba(10,8,6,.6);
    display:none;align-items:flex-end;z-index:20;
  }
  .sheet-bg.show{display:flex;}
  .sheet{
    background:var(--surface-2);width:100%;border-radius:20px 20px 0 0;
    padding:20px 18px 26px;
  }
  .sheet h3{margin:0 0 4px;font-size:16px;}
  .sheet p{margin:0 0 16px;color:var(--muted);font-size:12.5px;line-height:1.4;}
  .sheet input{
    width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:11px;padding:12px 13px;font-size:14px;font-family:'Manrope',sans-serif;margin-bottom:12px;
  }
  .sheet .go{
    width:100%;background:var(--accent);color:var(--accent-text);border:none;border-radius:12px;
    padding:13px;font-weight:800;font-size:14px;font-family:'Manrope',sans-serif;
  }
  .link-box{
    display:none;background:var(--surface);border:1px dashed var(--line);border-radius:11px;
    padding:12px;margin-top:4px;font-family:'IBM Plex Mono',monospace;font-size:13px;
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .link-box.show{display:flex;}
  .link-box span{overflow:hidden;text-overflow:ellipsis;color:var(--accent);}
  .link-box button{background:none;border:none;color:var(--muted);font-size:11.5px;font-family:'Manrope',sans-serif;}

  /* ── история предложений ─────────────────────────────────── */
  .hist-row{
    background:var(--surface);border:1px solid var(--line);border-radius:11px;
    padding:11px 12px;margin-bottom:8px;
  }
  .hist-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .hist-name{font-weight:700;font-size:13.5px;}
  .hist-when{font-size:11px;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
  .hist-meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .hist-status{
    display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:11.5px;font-weight:700;
  }
  .hist-status .dot{width:7px;height:7px;border-radius:50%;}
  .hist-status.sent .dot{background:var(--muted-2);}
  .hist-status.viewed .dot{background:#7aa6c2;}
  .hist-status.booked .dot{background:#7fae6a;}
</style>

<script>
const SUPABASE_URL = 'https://lqhuegdwglzkfzjcfxdx.supabase.co/rest/v1';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxaHVlZ2R3Z2x6a2Z6amNmeGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MjA5NjIsImV4cCI6MjA5NzM5Njk2Mn0.egEtZ5Av8tAD_Y6tKtWowxpbHoCiDezWEG5gWpEYNpo';

let UNITS = [];

async function loadUnitsFromSupabase(){
  const fields = 'id,room_no,tower,floor,room_type,area_sqm,price_per_sqm,selling_price,status,status_updated_at,projects(code,name)';
  const res = await fetch(`${SUPABASE_URL}/units?select=${fields}&order=selling_price.asc`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`
    }
  });
  if(!res.ok) throw new Error(`Склад ответил с ошибкой: ${res.status}`);
  const rows = await res.json();
  return rows.map(r => ({
    id: r.room_no,
    dbId: r.id,
    project: r.projects ? r.projects.code : '?',
    tower: r.tower,
    floor: r.floor,
    roomType: r.room_type,
    area: r.area_sqm,
    pricePerSqm: r.price_per_sqm,
    price: r.selling_price,
    status: r.status === 'sold' ? 'Sold' : 'Available',
    statusUpdatedAt: r.status_updated_at,
  }));
}

const PROJ_LABEL = {VIK:'Vivana Kamala',KAT:'KataBello',BAN:'Balcony Naiyang',OLN:'Olive Naiyang'};
const PROJ_VAR = {VIK:'var(--vik)',KAT:'var(--kat)',BAN:'var(--ban)',OLN:'var(--oln)'};

const SB_HEADERS = {
  apikey: SUPABASE_ANON_KEY,
  Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type': 'application/json',
};

let CURRENT_AGENT = null; // {id, full_name, agency, telegram_id, is_founding_agent}

// Защита: если конкретный запрос вернул не список (например, таблица ещё
// не создана в базе), не роняем всю страницу, а считаем список пустым —
// и пишем явную причину в консоль браузера для отладки.
async function fetchArray(url){
  try {
    const res = await fetch(url, {headers: SB_HEADERS});
    const data = await res.json();
    if(!Array.isArray(data)){
      console.error('Ожидался список из Supabase, получено:', data, 'URL:', url);
      return [];
    }
    return data;
  } catch(e){
    console.error('Ошибка запроса', url, e);
    return [];
  }
}

// ── кто открыл приложение ───────────────────────────────────
// Узнаём агента по его Telegram-аккаунту автоматически — без анкеты.
// Если такого агента ещё нет в базе, регистрируем его на лету
// (это и есть та самая самостоятельная регистрация без бумажной волокиты).
async function identifyAgent(){
  const tg = window.Telegram?.WebApp;
  tg?.ready(); tg?.expand();
  const tgUser = tg?.initDataUnsafe?.user;
  if(!tgUser) return null; // открыто не через Telegram-бота — гостевой режим

  const found = await fetch(`${SUPABASE_URL}/agents?telegram_id=eq.${tgUser.id}&select=*`, {headers: SB_HEADERS});
  const foundRows = await found.json();
  if(foundRows.length) return foundRows[0];

  const fullName = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') || 'Агент';
  const created = await fetch(`${SUPABASE_URL}/agents`, {
    method: 'POST',
    headers: {...SB_HEADERS, Prefer: 'return=representation'},
    body: JSON.stringify({
      telegram_id: tgUser.id,
      full_name: fullName,
      avatar_url: tgUser.photo_url || null,
      is_founding_agent: true,
      commission_rate_pct: 7,
    }),
  });
  if(!created.ok) return null;
  const rows = await created.json();
  return rows[0] || null;
}

function renderTopbar(){
  const nameEl = document.getElementById('whoName');
  const agEl = document.getElementById('whoAgency');
  const avEl = document.getElementById('avatarBox');
  if(CURRENT_AGENT){
    nameEl.textContent = CURRENT_AGENT.full_name;
    agEl.textContent = (CURRENT_AGENT.agency || 'Независимый агент') +
      (CURRENT_AGENT.is_founding_agent ? ' · агент-основатель' : '');
    const initials = CURRENT_AGENT.full_name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
    avEl.textContent = initials || 'A';
  } else {
    nameEl.textContent = 'Гость';
    agEl.textContent = 'Открой через Telegram-бота для создания ссылок';
  }
}

const TYPE_BUCKETS = [
  {id:'1BR',label:'1 спальня', test:r=>/1\s*BEDROOM(?!\s*PLUS)/i.test(r) && !/PH/i.test(r)},
  {id:'1BRP',label:'1 спальня+', test:r=>/PLUS/i.test(r) && !/PH/i.test(r)},

  {id:'PH',label:'Penthouse', test:r=>/PH/i.test(r)},
];
function typeOf(roomType){return (TYPE_BUCKETS.find(b=>b.test(roomType))||{}).id;}

const BUDGETS = [
  {id:'all', label:'любой', test:()=>true},
  {id:'lt5', label:'до 5М', test:p=>p<5_000_000},

  {id:'gt12', label:'12М+', test:p=>p>=12_000_000},
];

let state = { proj:'ALL', type:null, budget:'all', sort:'asc', selected:new Set() };

function fmtTHB(n){ return new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' ฿'; }
function fmtTHBshort(n){
  if(n>=1_000_000) return (n/1_000_000).toFixed(1).replace('.0','') + 'М ฿';
  return new Intl.NumberFormat('ru-RU').format(n) + ' ฿';
}

// ── правильное склонение времени по-русски ──────────────────
function pluralRu(n, one, few, many){
  const mod100 = Math.abs(n) % 100, mod10 = mod100 % 10;
  if(mod100 > 10 && mod100 < 20) return many;
  if(mod10 > 1 && mod10 < 5) return few;
  if(mod10 === 1) return one;
  return many;
}
function timeAgo(iso){
  const mins = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 60000));
  if(mins < 60) return `${mins} ${pluralRu(mins,'минуту','минуты','минут')} назад`;
  const hours = Math.floor(mins/60);
  if(hours < 24) return `${hours} ${pluralRu(hours,'час','часа','часов')} назад`;
  const days = Math.floor(hours/24);
  if(days < 7) return `${days} ${pluralRu(days,'день','дня','дней')} назад`;
  const weeks = Math.floor(days/7);
  if(weeks < 5) return `${weeks} ${pluralRu(weeks,'неделю','недели','недель')} назад`;
  const months = Math.floor(days/30);
  return `${months} ${pluralRu(months,'месяц','месяца','месяцев')} назад`;
}

// ── тикер ────────────────────────────────────────────────────
function buildTicker(){
  const sold = UNITS.filter(u=>u.status==='Sold').sort((a,b)=> new Date(b.statusUpdatedAt) - new Date(a.statusUpdatedAt));
  const wrap = document.querySelector('.ticker-wrap');
  if(!sold.length){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  const items = sold.map(u=>`
    <span class="tick"><span class="dot" style="background:${PROJ_VAR[u.project]}"></span>
      ПРОДАНО <b>${u.id}</b> · ${PROJ_LABEL[u.project]} <span class="ago">· ${timeAgo(u.statusUpdatedAt)}</span>
    </span>`).join('');
  const track = document.getElementById('ticker');
  track.innerHTML = items + items; // дублируем для бесшовной прокрутки

  // одинаковый темп ленты независимо от ширины экрана (раньше на ПК "летело")
  requestAnimationFrame(()=>{
    const singleWidth = track.scrollWidth / 2;
    const pxPerSecond = 38;
    track.style.animationDuration = Math.max(10, singleWidth / pxPerSecond) + 's';
  });
}
setInterval(()=>{ if(UNITS.length) buildTicker(); }, 60000); // держим "N минут назад" свежим

// ── фильтры (чипы) ──────────────────────────────────────────
function buildProjChips(){
  const wrap = document.getElementById('projChips');
  const all = ['ALL','VIK','KAT','BAN','OLN'];
  wrap.innerHTML = all.map(p=>{
    const label = p==='ALL' ? 'Все проекты' : PROJ_LABEL[p];
    const sw = p==='ALL' ? '' : `<span class="sw" style="background:${PROJ_VAR[p]}"></span>`;
    return `<div class="chip ${state.proj===p?'active proj-'+p:''}" data-proj="${p}">${sw}${label}</div>`;
  }).join('');
  wrap.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{state.proj=el.dataset.proj;render();});
}
function buildTypeChips(){
  const wrap = document.getElementById('typeChips');
  wrap.innerHTML = `<div class="chip ${!state.type?'active':''}" data-type="">Все типы</div>` +
    TYPE_BUCKETS.map(b=>`<div class="chip ${state.type===b.id?'active':''}" data-type="${b.id}">${b.label}</div>`).join('');
  wrap.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{state.type=el.dataset.type||null;render();});
}
function cycleBudget(){
  const idx = BUDGETS.findIndex(b=>b.id===state.budget);
  state.budget = BUDGETS[(idx+1)%BUDGETS.length].id;
  render();
}
document.getElementById('budgetChip').onclick = cycleBudget;
document.getElementById('sortChip').onclick = ()=>{ state.sort = state.sort==='asc'?'desc':'asc'; render(); };

// ── рендер списка ───────────────────────────────────────────
function render(){
  buildProjChips(); buildTypeChips();
  document.getElementById('budgetChip').textContent = 'Бюджет: ' + BUDGETS.find(b=>b.id===state.budget).label;
  document.getElementById('sortChip').textContent = 'Цена ' + (state.sort==='asc'?'↑':'↓');

  let items = UNITS.filter(u=>{
    if(state.proj!=='ALL' && u.project!==state.proj) return false;
    if(state.type && typeOf(u.roomType)!==state.type) return false;
    if(!BUDGETS.find(b=>b.id===state.budget).test(u.price)) return false;
    return true;
  });
  items.sort((a,b)=> state.sort==='asc' ? a.price-b.price : b.price-a.price);
  // проданные — в конец списка, независимо от сортировки по цене
  items.sort((a,b)=> (a.status==='Sold')-(b.status==='Sold'));

  const avail = items.filter(u=>u.status==='Available').length;
  document.getElementById('countText').textContent = `${avail} юнитов`;

  const list = document.getElementById('list');
  if(items.length===0){
    list.innerHTML = `<div class="empty">Под эти параметры ничего нет.<br>Попробуй увеличить бюджет или снять фильтр по типу.</div>`;
  } else {
    list.innerHTML = items.map(u=>{
      const sold = u.status==='Sold';
      const sel = state.selected.has(u.id);
      return `<div class="unit ${sold?'sold':''} ${sel?'selected':''}" data-id="${u.id}" data-sold="${sold}">
        <div class="bar" style="background:${PROJ_VAR[u.project]}"></div>
        <div class="ubox">
          <div class="u-top"><span class="u-code">${u.id}</span><span class="u-proj">· ${PROJ_LABEL[u.project]}, башня ${u.tower}, ${u.floor} эт.</span></div>
          <div class="u-mid">${u.roomType} · ${u.area} м²</div>
          <div class="u-bottom"><span class="price">${fmtTHB(u.price)}</span><span class="ppsqm">${fmtTHBshort(u.pricePerSqm)}/м²</span></div>
        </div>
        ${sold ? `<div class="sold-tag">ПРОДАН</div>` : `<div class="pick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></div>`}
      </div>`;
    }).join('');
    list.querySelectorAll('.unit').forEach(el=>{
      if(el.dataset.sold==='true') return;
      el.onclick = ()=>{
        const id = el.dataset.id;
        if(state.selected.has(id)) state.selected.delete(id); else state.selected.add(id);
        render();
      };
    });
  }
  updateCartbar();
}

function updateCartbar(){
  const sel = [...state.selected];
  const bar = document.getElementById('cartbar');
  const badge = document.getElementById('cartBadge');
  if(sel.length===0){
    bar.classList.remove('show');
    badge.style.display='none';
    return;
  }
  bar.classList.add('show');
  document.getElementById('cartCount').textContent = sel.length;
  badge.style.display = 'flex';
  badge.textContent = sel.length;
}

// ── модалка предложения ────────────────────────────────────
const sheetBg = document.getElementById('sheetBg');
document.getElementById('makeOfferBtn').onclick = ()=>{
  document.getElementById('sheetSub').textContent = `${state.selected.size} объект(ов) выбрано`;
  document.getElementById('linkBox').classList.remove('show');
  document.getElementById('clientName').value='';
  sheetBg.classList.add('show');
};
sheetBg.onclick = (e)=>{ if(e.target===sheetBg) sheetBg.classList.remove('show'); };

document.getElementById('genLink').onclick = async ()=>{
  if(!CURRENT_AGENT){
    alert('Открой каталог через Telegram-бота — без этого нельзя узнать, от чьего имени делать предложение.');
    return;
  }
  const btn = document.getElementById('genLink');
  const prevLabel = btn.textContent;
  btn.disabled = true; btn.textContent = 'Создаю…';
  try {
    const name = document.getElementById('clientName').value.trim() || 'клиент';
    const slug = name.toLowerCase().replace(/[^a-zа-я0-9]+/gi,'-').slice(0,16) + '-' + Math.random().toString(36).slice(2,7);
    const unitDbIds = [...state.selected].map(roomNo => UNITS.find(u=>u.id===roomNo)?.dbId).filter(Boolean);

    const res = await fetch(`${SUPABASE_URL}/offers`, {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify({ agent_id: CURRENT_AGENT.id, client_name: name, slug, unit_ids: unitDbIds }),
    });
    if(!res.ok) throw new Error(`Не удалось сохранить (${res.status})`);

    const base = location.href.split('/').slice(0,-1).join('/');
    const link = `${base}/offer.html?slug=${slug}`;
    document.getElementById('linkText').textContent = link;
    document.getElementById('linkBox').classList.add('show');
  } catch(e) {
    alert('Не получилось создать ссылку: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = prevLabel;
  }
};

document.getElementById('copyLink').onclick = ()=>{
  navigator.clipboard?.writeText(document.getElementById('linkText').textContent);
  const b=document.getElementById('copyLink'); b.textContent='Скопировано'; setTimeout(()=>b.textContent='Скопировать',1400);
};
document.getElementById('cartIcon').onclick = ()=>{ if(state.selected.size) document.getElementById('makeOfferBtn').click(); };

// ── история предложений ─────────────────────────────────────

function fmtDateRu(d){
  return new Date(d+'T00:00:00').toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
}

async function openHistory(){
  const wrap = document.getElementById('historyList');
  wrap.innerHTML = '<div class="empty" style="padding:30px 10px;">Загружаем…</div>';
  document.getElementById('historyBg').classList.add('show');
  if(!CURRENT_AGENT){
    wrap.innerHTML = '<div class="empty" style="padding:30px 10px;">Открой каталог через Telegram-бота, чтобы видеть свои предложения.</div>';
    return;
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/offers?agent_id=eq.${CURRENT_AGENT.id}&select=*&order=created_at.desc`, {headers: SB_HEADERS});
    const offers = await res.json();
    if(!offers.length){
      wrap.innerHTML = '<div class="empty" style="padding:30px 10px;">Пока нет ни одного отправленного предложения.</div>';
      return;
    }
    const ids = offers.map(o=>o.id).join(',');
    const [views, bookings, viewings] = await Promise.all([
      fetchArray(`${SUPABASE_URL}/offer_views?offer_id=in.(${ids})&select=offer_id`),
      fetchArray(`${SUPABASE_URL}/offer_bookings?offer_id=in.(${ids})&select=offer_id,units(room_no)`),
      fetchArray(`${SUPABASE_URL}/offer_viewing_requests?offer_id=in.(${ids})&select=offer_id,requested_date,units(room_no)`),
    ]);

    wrap.innerHTML = offers.map(o=>{
      // считаем по новым таблицам; если предложение совсем старое (создано
      // до этого обновления) — подстраховываемся старым флагом first_viewed_at
      const viewCount = views.filter(v=>v.offer_id===o.id).length || (o.first_viewed_at ? 1 : 0);
      const myBookings = bookings.filter(b=>b.offer_id===o.id);
      const myViewings = viewings.filter(v=>v.offer_id===o.id);

      let statusClass='sent', statusText='Отправлено, ещё не открыто';
      if(viewCount > 0){ statusClass='viewed'; statusText = `Открыто ${viewCount} ${pluralRu(viewCount,'раз','раза','раз')}`; }

      const extra = [];
      if(myBookings.length){
        const rooms = myBookings.map(b=>(b.units||{}).room_no).filter(Boolean).join(', ');
        extra.push(`<div class="hist-status booked"><span class="dot"></span>Забронировал: ${rooms}</div>`);
      }
      if(myViewings.length){
        const list = myViewings.map(v=>`${(v.units||{}).room_no} — ${fmtDateRu(v.requested_date)}`).join('; ');
        extra.push(`<div class="hist-status booked"><span class="dot"></span>Запись на просмотр: ${list}</div>`);
      }

      return `<div class="hist-row">
        <div class="hist-top"><span class="hist-name">${o.client_name}</span><span class="hist-when">${timeAgo(o.created_at)}</span></div>
        <div class="hist-meta">${(o.unit_ids||[]).length} объект(ов) в подборке</div>
        <div class="hist-status ${statusClass}"><span class="dot"></span>${statusText}</div>
        ${extra.join('')}
      </div>`;
    }).join('');
  } catch(e) {
    wrap.innerHTML = `<div class="empty" style="padding:30px 10px;">Не удалось загрузить: ${e.message}</div>`;
  }
}
document.getElementById('historyIcon').onclick = openHistory;
document.getElementById('historyBg').onclick = (e)=>{ if(e.target.id==='historyBg') e.target.classList.remove('show'); };

async function init(){
  document.getElementById('list').innerHTML = '<div class="empty">Загружаем актуальный каталог со склада…</div>';
  document.getElementById('ticker').innerHTML = '';
  try {
    CURRENT_AGENT = await identifyAgent().catch(()=>null);
    renderTopbar();
    UNITS = await loadUnitsFromSupabase();
    buildTicker();
    render();
  } catch(e) {
    document.getElementById('list').innerHTML =
      `<div class="empty">Не удалось загрузить каталог.<br>${e.message}<br><br>Проверь интернет-соединение и попробуй обновить страницу.</div>`;
  }
}
init();
</script>
