<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flox — Каталог Пхукет</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=cyrillic" rel="stylesheet">
<style>
:root {
  --bg: #0d0d18;
  --surface: #111118;
  --surface-2: #1a1a26;
  --surface-3: #222232;
  --line: rgba(255,255,255,0.06);
  --line-2: rgba(255,255,255,0.1);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.45);
  --muted-2: rgba(255,255,255,0.2);
  --accent: #5E17EB;
  --accent-soft: rgba(94,23,235,0.18);
  --red: #FF6B6B;
  --red-soft: rgba(255,107,107,0.14);
  --green: #7BAF6E;
  --green-soft: rgba(123,175,110,0.15);
  --vik: #C9A84C; --kat: #7BAF6E; --ban: #6B9BC2; --oln: #8FAB5F;
}
body.light {
  --bg: #F5F5F7; --surface: #ffffff; --surface-2: #f0f0f4; --surface-3: #e8e8ee;
  --line: rgba(0,0,0,0.07); --line-2: rgba(0,0,0,0.12);
  --text: #111118; --muted: rgba(0,0,0,0.45); --muted-2: rgba(0,0,0,0.22);
  --accent-soft: rgba(94,23,235,0.1); --red-soft: rgba(224,85,85,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: 'Inter', system-ui, sans-serif; }
body { min-height: 100vh; background: var(--bg); color: var(--text); transition: background .3s, color .3s; -webkit-tap-highlight-color: transparent; }
a { color: inherit; text-decoration: none; }
input, button { font-family: inherit; }

/* ── TOPBAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: var(--surface); border-bottom: 0.5px solid var(--line);
  display: flex; align-items: center; gap: 0;
  padding: 0 24px; height: 52px;
}
.logo { display: flex; align-items: center; gap: 2px; font-size: 20px; font-weight: 700; letter-spacing: -0.05em; margin-right: 32px; }
.logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); margin-bottom: 10px; }
.nav { display: flex; align-items: center; gap: 2px; flex: 1; }
.nav-item {
  padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: background .15s, color .15s;
  position: relative;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.act { color: var(--accent); background: var(--accent-soft); }
.nav-badge {
  position: absolute; top: 2px; right: 6px;
  background: var(--red); color: #fff;
  font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 5px;
}
.topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.agent-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7B3FF5);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; cursor: pointer;
  flex-shrink: 0;
}
.theme-btn {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  background: var(--surface-2); color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.theme-btn:hover { background: var(--surface-3); }

/* ── PAGES ─── */
.page { display: none; min-height: calc(100vh - 52px); }
.page.act { display: block; }

/* ══════════════════════════════════════════
   SEARCH PAGE
══════════════════════════════════════════ */
.search-page {
  display: flex; flex-direction: column; align-items: center;
  padding: 80px 20px 40px;
}
.search-headline {
  font-size: clamp(28px, 4vw, 48px); font-weight: 700;
  letter-spacing: -0.04em; text-align: center; margin-bottom: 36px;
  line-height: 1.15;
}
.search-headline span { color: var(--accent); }

/* Type selector */
.type-selector { display: flex; gap: 8px; margin-bottom: 16px; }
.type-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: 12px; cursor: pointer;
  border: 1.5px solid var(--line-2); background: none; color: var(--muted);
  font-size: 12px; font-weight: 500; transition: all .15s;
}
.type-btn:hover { border-color: var(--accent); color: var(--text); }
.type-btn.act { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.type-btn svg { width: 22px; height: 22px; }

/* Search box */
.search-box-wrap {
  width: 100%; max-width: 720px;
  background: var(--surface);
  border: 1.5px solid var(--line-2);
  border-radius: 16px;
  transition: border-color .2s, box-shadow .2s;
  position: relative;
}
.search-box-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(94,23,235,0.12);
}
.search-row {
  display: flex; align-items: center; gap: 0;
  padding: 0 16px; height: 54px;
  border-bottom: 0.5px solid var(--line);
}
.search-icon { color: var(--muted); flex-shrink: 0; margin-right: 10px; }
.search-input {
  flex: 1; border: none; background: none; color: var(--text);
  font-size: 15px; outline: none;
}
.search-input::placeholder { color: var(--muted-2); }
.search-clear {
  width: 24px; height: 24px; border-radius: 50%; border: none;
  background: var(--surface-3); color: var(--muted); cursor: pointer;
  display: none; align-items: center; justify-content: center; flex-shrink: 0;
}
.search-clear.vis { display: flex; }

/* Filters row */
.filters-row {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; flex-wrap: wrap;
}
.filter-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--line-2); color: var(--muted); background: none;
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.act { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.filter-btn svg { width: 12px; height: 12px; }
.filter-sep { width: 1px; height: 20px; background: var(--line-2); flex-shrink: 0; }
.search-btn {
  margin-left: auto; padding: 6px 18px; border-radius: 20px;
  background: var(--accent); color: #fff; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.search-btn:hover { opacity: .88; }

/* Active filters chips */
.active-filters {
  display: flex; gap: 6px; flex-wrap: wrap;
  width: 100%; max-width: 720px; margin-top: 10px;
  min-height: 0;
}
.filter-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 12px;
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid var(--accent);
}
.chip-remove {
  width: 14px; height: 14px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; flex-shrink: 0;
}
.reset-all {
  font-size: 12px; color: var(--muted); cursor: pointer;
  padding: 4px 8px; border-radius: 8px;
  background: none; border: none;
  transition: color .15s;
}
.reset-all:hover { color: var(--red); }

/* Autocomplete dropdown */
.autocomplete {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--line-2);
  border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  z-index: 300; overflow: hidden; display: none;
}
.autocomplete.vis { display: block; }
.ac-section-title {
  font-size: 10px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  padding: 10px 14px 4px;
}
.ac-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  transition: background .1s;
}
.ac-item:hover { background: var(--surface-2); }
.ac-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent-soft); display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.ac-name { font-size: 13px; font-weight: 500; }
.ac-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ac-arrow { margin-left: auto; color: var(--muted); font-size: 14px; }

/* Results */
.search-results {
  width: 100%; max-width: 720px; margin-top: 24px;
}
.results-label {
  font-size: 13px; color: var(--muted); margin-bottom: 14px;
}
.project-cards { display: flex; flex-direction: column; gap: 10px; }
.project-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: border-color .2s, transform .15s;
  text-decoration: none; color: var(--text);
}
.project-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.project-card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.project-card-info { flex: 1; }
.project-card-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.project-card-sub { font-size: 12px; color: var(--muted); }
.project-card-price { font-size: 13px; font-weight: 600; color: var(--accent); }
.project-card-arrow { color: var(--muted); }

/* Developer group */
.dev-group { margin-bottom: 10px; }
.dev-group-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--surface);
  border: 1px solid var(--line); border-radius: 12px;
  cursor: pointer; transition: border-color .15s;
  font-size: 13px; font-weight: 600;
}
.dev-group-header:hover { border-color: var(--accent); }
.dev-group-count { font-size: 11px; color: var(--muted); margin-left: auto; }
.dev-group-chevron { color: var(--muted); transition: transform .2s; }
.dev-group.open .dev-group-chevron { transform: rotate(180deg); }
.dev-group-items { display: none; padding: 6px 0 0 12px; }
.dev-group.open .dev-group-items { display: flex; flex-direction: column; gap: 6px; }

/* Price modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 500; display: none; align-items: center; justify-content: center;
}
.modal-overlay.vis { display: flex; }
.modal {
  background: var(--surface); border-radius: 20px;
  padding: 24px; width: 480px; max-width: calc(100vw - 40px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; }
.price-histogram { display: flex; align-items: flex-end; gap: 3px; height: 60px; margin-bottom: 16px; }
.price-bar { flex: 1; background: var(--accent); border-radius: 3px 3px 0 0; opacity: 0.7; transition: opacity .15s; }
.price-bar:hover { opacity: 1; }
.price-inputs { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.price-input-wrap {
  flex: 1; display: flex; align-items: center; gap: 8px;
  background: var(--surface-2); border: 1px solid var(--line-2);
  border-radius: 10px; padding: 10px 12px; font-size: 13px;
}
.price-input-wrap input { flex: 1; border: none; background: none; color: var(--text); font-size: 13px; outline: none; width: 80px; }
.price-input-label { color: var(--muted); font-size: 11px; }
.price-tabs { display: flex; background: var(--surface-2); border-radius: 8px; padding: 2px; margin-bottom: 16px; width: fit-content; }
.price-tab { padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all .15s; }
.price-tab.act { background: var(--surface); color: var(--text); }
.price-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.price-preset {
  padding: 6px 14px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--line-2); color: var(--muted); cursor: pointer;
  background: none; transition: all .15s;
}
.price-preset:hover, .price-preset.act { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.modal-actions { display: flex; justify-content: space-between; align-items: center; }
.modal-clear { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; }
.modal-apply { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* Completion modal */
.completion-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.completion-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 10px; cursor: pointer;
  border: 1px solid var(--line); transition: all .15s;
}
.completion-item:hover, .completion-item.act { border-color: var(--accent); background: var(--accent-soft); }
.completion-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }

/* ══════════════════════════════════════════
   OFFERS PAGE
══════════════════════════════════════════ */
.offers-page { padding: 24px; max-width: 900px; margin: 0 auto; }
.offers-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.offers-title { font-size: 20px; font-weight: 700; }
.offers-list { display: flex; flex-direction: column; gap: 10px; }
.offer-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px 18px;
}
.offer-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.offer-client { font-size: 15px; font-weight: 600; }
.offer-time { font-size: 12px; color: var(--muted); }
.offer-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.offer-url {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2); border-radius: 8px; padding: 8px 12px;
}
.offer-url-text { font-size: 12px; color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.offer-copy {
  padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
  background: var(--accent-soft); color: var(--accent); border: none; cursor: pointer;
  white-space: nowrap;
}

/* ══════════════════════════════════════════
   ACTIVITY PAGE  
══════════════════════════════════════════ */
.activity-page { padding: 24px; max-width: 900px; margin: 0 auto; }
.activity-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
.activity-list { display: flex; flex-direction: column; gap: 10px; }
.activity-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px 18px;
}
.act-client { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.act-count { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.act-events { display: flex; flex-direction: column; gap: 5px; }
.act-event { display: flex; align-items: center; gap: 7px; font-size: 12px; }
.act-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── UTILS ─── */
.loader { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">flox<span class="logo-dot"></span></div>
  <nav class="nav">
    <div class="nav-item act" data-page="search" onclick="setPage('search')">Поиск</div>
    <div class="nav-item" data-page="offers" onclick="setPage('offers')">
      Инструменты
    </div>
    <div class="nav-item" data-page="activity" onclick="setPage('activity')">Клиенты</div>
  </nav>
  <div class="topbar-right">
    <div class="agent-avatar" id="agentAvatar">ИК</div>
    <button class="theme-btn" onclick="toggleTheme()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</div>

<!-- SEARCH PAGE -->
<div class="page act" id="page-search">
  <div class="search-page">
    <div class="search-headline">Более <span>728</span> предложений<br>на Пхукете</div>

    <!-- Type selector -->
    <div class="type-selector">
      <button class="type-btn act" data-type="condo" onclick="selectType('condo')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Кондо
      </button>
      <button class="type-btn" data-type="villa" onclick="selectType('villa')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M3 9l9-6 9 6M9 21V12h6v9"/></svg>
        Вилла
      </button>
      <button class="type-btn" data-type="townhouse" onclick="selectType('townhouse')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M4 21V8l8-5 8 5v13M9 21v-7h6v7"/></svg>
        Таунхаус
      </button>
    </div>

    <!-- Search box -->
    <div class="search-box-wrap" id="searchWrap">
      <div class="search-row">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </span>
        <input class="search-input" id="searchInput" type="text"
          placeholder="Поиск по названию проекта, застройщику, району"
          oninput="onSearchInput(this.value)"
          autocomplete="off">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>

      <!-- Filters -->
      <div class="filters-row">
        <button class="filter-btn" id="filterType" onclick="openTypeFilter()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
          <span id="filterTypeLabel">Тип</span>
        </button>
        <div class="filter-sep"></div>
        <button class="filter-btn" id="filterPrice" onclick="openPriceModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span id="filterPriceLabel">Цена</span>
        </button>
        <div class="filter-sep"></div>
        <button class="filter-btn" id="filterCompletion" onclick="openCompletionModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span id="filterCompletionLabel">Срок сдачи</span>
        </button>
        <div class="filter-sep"></div>
        <button class="filter-btn" onclick="openAllFilters()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M8 12h8M11 18h2"/></svg>
          Все фильтры
        </button>
        <button class="search-btn" onclick="doSearch()">Найти</button>
      </div>

      <!-- Autocomplete -->
      <div class="autocomplete" id="autocomplete"></div>
    </div>

    <!-- Active filter chips -->
    <div class="active-filters" id="activeFilters"></div>

    <!-- Results -->
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- OFFERS PAGE (Инструменты → Мои предложения) -->
<div class="page" id="page-offers">
  <div class="offers-page">
    <div class="offers-header">
      <div class="offers-title">Мои предложения</div>
    </div>
    <div class="offers-list" id="offersList"><div class="loader">Загрузка…</div></div>
  </div>
</div>

<!-- ACTIVITY PAGE (Клиенты → Последняя активность) -->
<div class="page" id="page-activity">
  <div class="activity-page">
    <div class="activity-title">Последняя активность</div>
    <div class="activity-list" id="activityList"><div class="loader">Загрузка…</div></div>
  </div>
</div>

<!-- PRICE MODAL -->
<div class="modal-overlay" id="priceModal" onclick="closePriceModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      Выберите цену
      <button class="modal-close" onclick="closePriceModal()">✕</button>
    </div>
    <div class="price-histogram" id="priceHistogram"></div>
    <div class="price-tabs">
      <div class="price-tab act" onclick="setPriceTab('unit',this)">Юнит</div>
      <div class="price-tab" onclick="setPriceTab('sqm',this)">м²</div>
    </div>
    <div class="price-inputs">
      <div class="price-input-wrap">
        <input type="number" id="priceMin" placeholder="Мин. цена">
        <span class="price-input-label">THB</span>
      </div>
      <span style="color:var(--muted)">—</span>
      <div class="price-input-wrap">
        <input type="number" id="priceMax" placeholder="Макс. цена">
        <span class="price-input-label">THB</span>
      </div>
    </div>

// ── FUZZY SEARCH ──────────────────────────────────
function fuzzyMatch(query, text) {
  if (!query || !text) return false;
  const q = query.toLowerCase().trim();
  const t = text.toLowerCase();
  if (t.includes(q)) return true;
  // Allow 1 typo for queries > 3 chars
  if (q.length > 3) {
    for (let i = 0; i < q.length; i++) {
      const variant = q.slice(0, i) + q.slice(i + 1);
      if (t.includes(variant)) return true;
    }
  }
  return false;
}

function matchProject(q, p) {
  return fuzzyMatch(q, p.name) || fuzzyMatch(q, p.nameEn) ||
    fuzzyMatch(q, p.district) || fuzzyMatch(q, p.districtRu) ||
    fuzzyMatch(q, p.developer) || fuzzyMatch(q, p.id);
}

function matchDistrict(q) {
  const results = [];
  for (const [en, data] of Object.entries(DISTRICTS)) {
    if (fuzzyMatch(q, en) || fuzzyMatch(q, data.ru)) results.push({ en, ...data });
  }
  return results;
}

function matchAmphoe(q) {
  return AMPHOE.filter(a => fuzzyMatch(q, a) || fuzzyMatch(q, AMPHOE_RU[a]));
}

function matchDeveloper(q) {
  const devs = [...new Set(PROJECTS.map(p => p.developer))];
  return devs.filter(d => fuzzyMatch(q, d));
}

  document.getElementById('offersList').innerHTML = offers.map(o => {
    const units = (o.unit_ids||[]).length;
    const url = `https://nottodayman26.github.io/phuket-catalog/offer.html?slug=${o.slug}`;
    const ago = timeAgo(o.created_at);
    return `
      <div class="offer-card">
        <div class="offer-card-top">
          <div class="offer-client">${o.client_name || 'Клиент'}</div>
          <div class="offer-time">${ago}</div>
        </div>
        <div class="offer-meta">${units} объект${units===1?'':'ов'} в подборке</div>
        <div class="offer-url">
          <span class="offer-url-text">${url}</span>

        </div>
      </div>`;
  }).join('');
}

function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => { btn.textContent = 'Скопировано'; setTimeout(() => btn.textContent = 'Копировать', 2000); });
}

// ── ACTIVITY PAGE ─────────────────────────────────
async function loadActivity() {
  if (!AGENT) { document.getElementById('activityList').innerHTML = '<div class="empty">Войдите через Telegram-бота</div>'; return; }
  const r = await h(`${SUPABASE_URL}/offers?agent_id=eq.${AGENT.id}&select=id,client_name,created_at,unit_ids&order=created_at.desc&limit=20`);
  const offers = await r.json();
  if (!offers.length) { document.getElementById('activityList').innerHTML = '<div class="empty">Нет активности</div>'; return; }

  const ids = offers.map(o => o.id).join(',');
  const [vr, br] = await Promise.all([
    h(`${SUPABASE_URL}/offer_views?offer_id=in.(${ids})&select=offer_id`),
    h(`${SUPABASE_URL}/offer_bookings?offer_id=in.(${ids})&select=offer_id,units(room_no)`)
  ]);
  const views = await vr.json();
  const bookings = await br.json();

  const viewMap = views.reduce((m,v) => { m[v.offer_id] = (m[v.offer_id]||0)+1; return m; }, {});
  const bookMap = bookings.reduce((m,b) => { (m[b.offer_id] = m[b.offer_id]||[]).push(b.units?.room_no); return m; }, {});

  document.getElementById('activityList').innerHTML = offers.map(o => {
    const vc = viewMap[o.id] || 0;
    const bc = bookMap[o.id] || [];
    const units = (o.unit_ids||[]).length;
    let events = [];
    if (vc) events.push(`<div class="act-event"><div class="act-dot" style="background:var(--accent)"></div>Открыто ${vc} раз${vc===1?'':'а'}</div>`);
    if (bc.length) events.push(`<div class="act-event"><div class="act-dot" style="background:var(--red)"></div>Забронировал: ${bc.join(', ')}</div>`);
    if (!vc && !bc.length) events.push(`<div class="act-event"><div class="act-dot" style="background:var(--muted)"></div>Отправлено, ещё не открыто</div>`);
    return `
      <div class="activity-card">
        <div class="act-client">${o.client_name || 'Клиент'}</div>
        <div class="act-count">${units} объект${units===1?'':'ов'} в подборке · ${timeAgo(o.created_at)}</div>
        <div class="act-events">${events.join('')}</div>
      </div>`;
  }).join('');
}

    const r = await h(`${SUPABASE_URL}/agents?telegram_id=eq.${tg.id}&select=*`);
    const agents = await r.json();
    if (agents.length) { AGENT = agents[0]; localStorage.setItem('flox-agent', JSON.stringify(AGENT)); renderAgent(); }
  }
}

function renderAgent() {
  if (!AGENT) return;
  const initials = [AGENT.first_name?.[0], AGENT.last_name?.[0]].filter(Boolean).join('').toUpperCase() || 'АГ';
  document.getElementById('agentAvatar').textContent = initials;
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
  if (diff < 86400) return Math.floor(diff/3600) + ' ч назад';
  return Math.floor(diff/86400) + ' дн назад';
}

// ── INIT ──────────────────────────────────────────
initAgent();
</script>
</body>
</html>
